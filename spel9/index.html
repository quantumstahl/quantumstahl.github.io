        ctx.restore();
    }

let lastTime = 0;

function gameLoop(time){
    if (!lastTime) lastTime = time;

    let deltaMs = time - lastTime;
    lastTime = time;

    if (deltaMs > 50) deltaMs = 50;
   
   
   
    const scale = deltaMs / (1000 / 60);

    update(scale);
    requestAnimationFrame(gameLoop);
}

function updateratfish(scale){
    const ratfish = game.getobjecttype('ratfish')?.objects || [];

    for (const r of ratfish){
        if (game.getobjecttype("swordguy").objects.length === 0) continue;
        const bird = game.getobjecttype("swordguy");

        r.dual = 10;

        r.x += r.vx * scale;
        r.y += r.vy * scale;

        r.vx *= Math.pow(0.93, scale);
        r.vy *= Math.pow(0.93, scale);

        if (Math.abs(r.vx) < 0.2) r.vx = 0;
        if (Math.abs(r.vy) < 0.2) r.vy = 0;

        const waterobject = game.collideswiths(r,"water2");
        if (waterobject){
            r.counter2 = 0;
            if (r.fliped) {
                spawnBubble(
                    r.x + game.getcamerax(),
                    r.y + 45 + game.getcameray(),
                    game.getcamerax(),
                    game.getcameray(),
                    waterobject.y,
                    scale,2        
                );
            }
            if (!r.fliped) {
                spawnBubble(
                    r.x + game.getcamerax() + r.dimx,
                    r.y + 45 + game.getcameray(),
                    game.getcamerax(),
                    game.getcameray(),
                    waterobject.y,
                    scale,
                    2
                );
            }
        }

        if (r.counter2 > 0) r.counter2 -= 1 * scale;

        if (
            r.counter2 <= 0 &&
            !game.collideswiths(r,"sword") &&
            !game.collideswiths(r,"swordguy") &&
            (game.collideswiths(r,"ground") || !game.collideswiths(r,"water2"))
        ){
            r.fliped = !r.fliped;
            r.counter2 = 60;
        }

        if (!game.collideswiths(r,"water2")) r.y += 11 * scale;

        if (r.alertT > 0) r.alertT -= 1 * scale;

        if (r.state == "patrol"){
            if (r.counter2 >= 50 || r.counter2 <= 0){
                if (r.fliped) r.x -= 3 * scale;
                if (!r.fliped) r.x += 3 * scale;
            }

            let dx = bird.objects[0].x - r.x;
            let dy = bird.objects[0].y - r.y;
            let len = Math.hypot(dx,dy) || 1;

            if (len < 440){
                r.alertT = 50;
                r.state = "alert";
                r.counter = 0;
            }
        }
        else if (r.state == "alert"){
            r.counter += 1 * scale;

            let dx = bird.objects[0].x - r.x;
            let dy = bird.objects[0].y - r.y;
            let len = Math.hypot(dx,dy) || 1;

            if (dx < -5) r.fliped = true;
            else if (dx > 5) r.fliped = false;

            if (r.counter > 50){
                r.state = "dash";
                r.counter = 0;

                r.vx = dx / len * 25;
                r.vy = dy / len * 25;
            }
        }
        else if (r.state == "dash"){
            if (game.collideswiths(r,"water2")){
                handleCombat(r, ["swordguy"], 2,scale);
            }
            else{r.vx=0;r.vy=0;}
            r.counter += 1 * scale;
            if (r.counter > 40){
                r.state = "cooldown";
                r.counter = 0;
            }
        }
        else if (r.state == "cooldown"){
            r.counter += 1 * scale;

            // ta bort detta block helt om du redan flyttar i början av funktionen
            // annars dubbelflyttar du i cooldown
            // r.x += r.vx * scale;
            // r.y += r.vy * scale;

            if (r.counter > 35){
                r.state = "patrol";
                r.counter = 0;
            }
        }
    }
}

function drawUnderwater(ctx, sourceCanvas, time) {

    const slice = 4;     // höjd på varje slice
    const strength = 6;  // hur mycket våg

    for (let y = 0; y < sourceCanvas.height-game.getcameray(); y += slice) {

        let offset = Math.sin((y * 0.05) + time * 0.003) * strength;

        ctx.drawImage(
            sourceCanvas,
            0, y+game.getcameray(), sourceCanvas.width, slice,
            offset, y+game.getcameray(), sourceCanvas.width, slice
        );

    }
}
function drawWaterSurface(ctx, x, width, waterY, time){

    ctx.beginPath();

    for(let i=0;i<=width;i+=10){

        let wave = Math.sin((i*0.05)+(time*0.004))*3;

        ctx.lineTo(x+i, waterY+wave);
    }

    ctx.strokeStyle="rgba(255,255,255,0.4)";
    ctx.lineWidth=2;
    ctx.stroke();

function drawHealthBars() {
    if(!game.maps[game.currentmap])return;
    
  const map = game.maps[game.currentmap];
  const zoom = 1 + (map.zoom / 100); // samma zoom som du använder för input
  const camX = map.camerax;
  const camY = map.cameray;

  const objs = game.getAllObjects().filter(o => o.name=="swordguy"|| o.name=="rat"|| o.name=="archer"|| o.name=="tank"|| o.name=="bat"|| o.name=="mage"|| o.name=="warlock"||o.name=="ratfish"||o.name=="giantratfish"||o.name=="batboss"||o.name=="gladiator");
  for (const o of objs) {
      if(!o.isvisable)continue;

    // defaultvärden om hälsa saknas
    if (o.maxhealth == null&&o.name=="gladiator"){o.maxhealth = 800;o.health = o.maxhealth;}
    if (o.maxhealth == null&&o.name=="giantratfish"){o.maxhealth = 800;o.health = o.maxhealth;}
    if (o.maxhealth == null&&o.name=="warlock"){o.maxhealth = 2500;o.health = o.maxhealth;}
    if (o.maxhealth == null&&o.name=="tank"){o.maxhealth = 200;o.health = o.maxhealth;}
    if (o.maxhealth == null&&(o.name=="mage"||o.name=="bat")){o.maxhealth = 50;o.health = o.maxhealth;}
    if (o.maxhealth == null){ o.maxhealth = Heroes.has(o.name) ? 30 : 100;o.health = o.maxhealth;}
    if (o.health == null) o.health = o.maxhealth;

    const hpPct = Math.max(0, Math.min(1, o.health / o.maxhealth));

    // Värld → skärm
    const sx = (o.x + camX) * zoom;
    const sy = (o.y + camY) * zoom;

    const barW = Math.max(20, o.dimx * zoom);  // skala med zoom, ha en min.bredd
    const barH = Math.max(3, 5 * (zoom >= 1 ? zoom : 1)); // öka svagt med zoom
    const offsetY = -10 * zoom; // ovanför objektet
    
        
    
    if(o.name=="swordguy"){
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(50, 50 + offsetY, 800, 30);

        // Röd full bar
        ctx.fillStyle = "red";
        ctx.fillRect(50, 50 + offsetY, 800, 30);

        // Grön nuvarande HP
        ctx.fillStyle = "lime";
        ctx.fillRect(50, 50 + offsetY, 800 * hpPct, 30);

        // Kant
        ctx.strokeStyle = "black";
        ctx.lineWidth = 1;
        ctx.strokeRect(50, 50 + offsetY, 800, 30);
        
    }
    else{
    // Bakgrund
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(sx, sy + offsetY, barW, barH);

    // Röd full bar
    ctx.fillStyle = "red";
    ctx.fillRect(sx, sy + offsetY, barW, barH);

    // Grön nuvarande HP
    ctx.fillStyle = "lime";
    ctx.fillRect(sx, sy + offsetY, barW * hpPct, barH);

    // Kant
    ctx.strokeStyle = "black";
    ctx.lineWidth = 1;

function handleCombat(unit, enemyTypes, damage,scale,dirbolder) {
  function attackFromFront(attacker, defender){
  const ddir = defender.fliped ? -1 : 1;
  const ax = attacker.x + attacker.dimx/2;
  const dx = ax - (defender.x + defender.dimx/2);
  return (dx * ddir > 0);
}

function warlockFrontOpen(w){
  // endast under OFF-fönstret
  return w.ai?.phase === 3 && w.ai?.shieldState === 'off';
}  
    
    

    for (const enemyType of enemyTypes) {
      let target = game.collideswith(unit, enemyType, "ghost");
      if(unit.name==="bolder")target=game.collideswith(unit, enemyType,dirbolder);
      if(unit.name==="bolder" && target==null)target=game.collideswith(unit, enemyType,"down");
      if(unit.name==="giantratfish" && target==null)target=game.collideswiths(unit, enemyType,unit.direction);
      if (target) {
          
          if (enemyType === "tank"){
                if (attackFromFront(unit, target)&&unit.name!=="death"){
                    // Blockerat!
                    spawnHitParticles(target.x+target.dimx/2, target.y+target.dimy/2, 8, "#aaa");
                    //playSound("clank");
                    continue; // hoppa över damage
                }
        }
        if (enemyType === 'warlock'){
            const front = attackFromFront(unit, target);

            if (target.ai?.phase === 3 && front){
              if (target.ai.shieldState === 'on' || target.ai.shieldState === 'warn'){
                // block → flash blå
                target.flashTimer = 6/scale;
                target.flashTimercolor = "rgba(168, 199, 255, 0.8)";

                spawnHitParticles(target.x+target.dimx/2, target.y, 6, "#a8c7ff");
                cameraShake(2,80);

                // knockback på spelaren
                const k = (unit.x<target.x)?-1:+1;
                unit.vx = (unit.vx||0)+k*2.5;
                unit.vy = -3;

                return; // block = ingen skada
              }
              // shieldState === 'off' ⇒ attack går igenom
            }
          }
          if(enemyType==="batboss"){
              target.ai.state="retreat";
              
          }
          
        // === DAMAGE ===
        target.health -= damage;
        target.flashTimer = 20/scale;
        spawnDamageNumber(-damage, unit.x, unit.y, { color: "#ff4d4d" });
        spawnHitParticles(target.x+target.dimx/2, target.y+target.dimy/2, 6);
        
        if(unit.name==="arrow"||unit.name==="sword")game.removeobject(game.getobjecttype(unit.name), unit);
    
        
        // === JUICE ===
        hitStop(3);                // fryser ~3 frames (≈50 ms vid 60fps)
        cameraShake(20, 120);       // 120 ms shake
        
        // === KNOCKBACK ===
        
        if(unit.name=="batboss"){
            const dir = (unit.x < target.x) ? +1 : -1;
            target.vx = dir * 10;  // kastas åt sidan
            target.vy = -10;       // lite upp i luften
            
        }
        else{
        const dir = (unit.x < target.x) ? +1 : -1;
        target.vx = dir * 20;  // kastas åt sidan
        target.vy = -25;       // lite upp i luften
        }
        // === DÖD ===
        if (target.health <= 0) {
            if(target.name=="swordguy"){
                gameState='game_over';
                audio.currentTime = 0;
                audio.pause();
                stateTimer=150;
                
            }
            
            // --- DROP LOOT ---
            const cx = target.x + target.dimx/2;
            const cy = target.y+target.dimy-30; // vid marken

            // Coin (100% chans)
            const c = game.addobject(game.getobjecttype("coin"),  cx, cy, 16,16, 0, false);
            c.vx = (Math.random()*2 - 1) * 1.2;
            c.vy = -6 - Math.random()*2;
            c.ay = 0.6;
            c.state = 'air';
            c.t = 0;
            c.pickDelay = 10;          // kan inte plockas direkt
            c.despawn = 60*20;         // ~20s

            // apple (30% chans)
            if (Math.random() < 0.3){
              const a = game.addobject(game.getobjecttype("apple"), cx+8, cy, 16,16, 0, false);
              a.vx = (Math.random()*2 - 1) * 1.0;
              a.vy = -7;
              a.ay = 0.6;
              a.state = 'air';
              a.t = 0;
              a.pickDelay = 10;
              a.despawn = 60*25;
            } 
            
            
            
            
            
            
            
            
          if(enemyType=="warlock"){outro=true;audio.src = "sounds/win.mp3";audio.play();}
          else{
              game.removeobject(game.getobjecttype(enemyType), target);
              return;
          }
        }
        return;
      }
    }

// ====== Tunables ======
const RAT_AI = {
  SPEED:        2.2,
  CHASE_SPEED:  3.2,
  SIGHT_X:     260,
  SIGHT_Y:      48,
  FORGET_X:    360,
  ATTACK_RANGE: 34,
  WINDUP_FR:     20,
  ATTACK_CD_FR: 26,
  TURN_CD_FR:   102,   // <— NYTT: “safe window” efter vändning
  ALERT_T_FR:   50,   // hur länge “!” visas när de får aggro
  SEP_RADIUS:   24,
  SEP_PUSH:      0.6
};

function initRat(r){
  if (r.ai) return;
  r.ai = {
    state:'patrol',
    dir: (r.fliped ? -1 : 1),
    vx:0, timer:0,
    target:null,
    turnCD:0,       // <— NYTT
    alertT:0,        // <— NYTT (för “!” och ev. ‘alert’-animation)
    vy:0,
    
    losCD: 0,
    canSee: false,
    lastSeenX:r.x,
    lastSeenY:r.y,
    huntT: 0,
    tturn:false,
    hurt: r.health
    
  };
}

function nearestPlayer(from){
  const t = game.getobjecttype('swordguy');
  if (!t || !t.objects || !t.objects.length) return null;
  let best=null,bd=1e9;
  for (const p of t.objects){
    const d = Math.abs(p.x-from.x) + Math.abs(p.y-from.y);
    if (d<bd){ bd=d; best=p; }
  }
  return best;
}

function ratSeparation(r, rats){
  for (const o of rats){
    if (o===r) continue;
    const dx=r.x-o.x, dy=r.y-o.y;
    const d2=dx*dx+dy*dy; if (d2===0) continue;
    if (d2 <= RAT_AI.SEP_RADIUS*RAT_AI.SEP_RADIUS){
      const d=Math.sqrt(d2), f=RAT_AI.SEP_PUSH*(1-d/RAT_AI.SEP_RADIUS);
      r.x += (dx/d)*f;
    }
  }
}
function dropDepthAhead(r, dir, maxCheck = 700) {

  const gs = window.G5?.gridStat;
  const rc = window.G5?.raycastStatics;
  if (!gs || !rc) return 0;

  const lookAhead = r.dimx * 0.6;

  const x = r.x + (dir > 0 ? r.dimx : 0) + dir * lookAhead;
  const y0 = r.y + r.dimy - 2;

  // vatten = behandla som stup
  if (game.collidepoint(x, y0 + 5, "water2")) {
      return maxCheck;
  }

  const hit = rc(gs, x, y0, x, y0 + maxCheck, { pad: 1 });

  if (!hit) return maxCheck;

  const floorY = (hit._aabb?.y ?? hit.y);

  return Math.max(0, floorY - y0);
}


function updateRats(scale){
  const rats = game.getobjecttype('rat')?.objects || [];
  for (const r of rats){
    if(!r.isonscreen)continue;  
      
    initRat(r);
    updatePhysics(r,scale);
    r.animation = 0;
    // din grav / dual hack
    r.y += 11*scale; 
    
    
    if(game.collideswith(r,"any","down")){
        r.y=r.y-(10*scale); 
    }
    
    r.dual = 35;

    //ratSeparation(r, rats);

    // target + avstånd
    if (!r.ai.target) r.ai.target = nearestPlayer(r);
    const P = r.ai.target;
    let dx=0, dy=0, distX=1e9;
    if (P){ dx=P.x-r.x; dy=P.y-r.y; distX=Math.abs(dx); }

    // tick timers
    if (r.ai.turnCD > 0){ r.ai.turnCD-=1;}
    if (r.alertT > 0) r.alertT-=1*scale;

    // ——— LOS (uppdateras inte varje frame)
    if (r.ai.losCD > 0) r.ai.losCD-=1*scale;
    if (r.ai.losCD <= 0 && P && r.isonscreen){
      r.ai.losCD = 6; // testa 4..10 (lägre = snabbare reaktion, mer CPU)
      const gridStat = window.G5?.gridStat;

      const eyeX = r.x + r.dimx*0.5;
      const eyeY = r.y + r.dimy*0.35;
      const px   = P.x + P.dimx*0.5;
      const py   = P.y + P.dimy*0.35;

      r.ai.canSee = window.G5?.hasLineOfSight?.(gridStat, eyeX, eyeY, px, py, {
        pad: 2,
        filter: (S) => true // här kan du senare ignorera "see-through" walls
      }) ?? true;
    }
    if(!r.ai.canSee)r.isvisable=false;
    else r.isvisable=true;
    
    const desiredDir = (dx < 0 ? -1 : 1);
    const seesPlayer = (P && distX < RAT_AI.SIGHT_X && Math.abs(dy) < RAT_AI.SIGHT_Y && r.ai.canSee&&r.ai.dir=== desiredDir);
    if (r.ai.state==='patrol' && seesPlayer){ 
      r.ai.state = 'chase'; 
      r.alertT = RAT_AI.ALERT_T_FR;          // <— visa “!”
     r.ai.tturn=true;
      // valfritt: setta animation “alert”
    }
    if (r.ai.state!=='patrol' && (!P || (distX>RAT_AI.FORGET_X && r.ai.tturn===false))){
      r.ai.state = 'patrol'; r.ai.target=null;
    }

    // ——— Vändhantering: om spelaren är på andra sidan → vänd + turn cooldown
    // Ger ett “backstab-fönster”: under turnCD kan råttan inte starta attack.
    
    if (P){
      
      if (desiredDir !== r.ai.dir&&(r.ai.tturn||r.ai.hurt!==r.health)){
          
          if(r.ai.turnCD==0){r.ai.turnCD = Math.floor(RAT_AI.TURN_CD_FR/scale);}
          if(r.ai.turnCD==1){r.ai.dir   = desiredDir;r.ai.tturn=false;r.ai.state = 'patrol';r.ai.hurt=r.health;}

      }
    }

    // ——— State machine
    switch (r.ai.state){
case 'patrol': {
  r.ai.vx = RAT_AI.SPEED * r.ai.dir;

  if (!game.collideswiths(r,'swordguy')){
    const gs = window.G5?.gridStat;
    const rc = window.G5?.raycastStatics;

    if (gs && rc){
      const dir = r.ai.dir > 0 ? 1 : -1;
      const frontX = r.x + (dir > 0 ? r.dimx : 0);

      // bröst
      const chestY = r.y + r.dimy * 0.35;
      const hitChest = rc(gs, frontX, chestY, frontX + dir * 10, chestY, { pad: 1 });

      // huvud (för diagonala tak som på bilden)
      const headY = r.y + r.dimy * 0.10;
      const hitHead = rc(gs, frontX, headY, frontX + dir * 10, headY, { pad: 1 });

      if (hitChest || hitHead) r.ai.dir *= -1;
      
      const drop = dropDepthAhead(r, dir, 700);
       if (drop > 600) r.ai.dir *= -1;
      
    } 
    if(game.collideswiths(r,'bolder')){r.counter+=1*scale;}
    else{
      if (game.collideswith(r,'any','left')){  r.ai.dir = +1;}
      else if (game.collideswith(r,'any','right')){ r.ai.dir = -1;}
    }
    
    if(r.counter>80){
        r.counter=0;
        if (game.collideswith(r,'any','left')) { r.ai.dir = +1;}
        if (game.collideswith(r,'any','right')) {r.ai.dir = -1;}
        
    }
    
    
  }
  break;
}

      case 'chase': {
        r.ai.vx = RAT_AI.CHASE_SPEED * r.ai.dir;
        r.ai.tturn=true;
        if (!game.collideswiths(r,'swordguy')){
          if (game.collideswith(r,'any','left')&&game.collideswith(r,'any','left').rot==0)  r.ai.dir = +1;
          if (game.collideswith(r,'any','right')&&game.collideswith(r,'any','right').rot==0) r.ai.dir = -1;
        }

        // Attack bara när:
        // - vi är inom range
        // - vi FAKTISKT FÖR rätten (dx*dir > 0)
        // - och vi är inte i vänd-cooldown
        if (P && game.collideswith(r, "swordguy", "ghost") && (dx * r.ai.dir) > 0 && r.ai.turnCD === 0){
          r.ai.state = 'windup';
          r.ai.timer = RAT_AI.WINDUP_FR;
          r.ai.vx = 0;
           r.animation = 1;
        }
        break;
      }

      case 'windup': {
        r.ai.vx = 0;
        r.animation = 1; // attack animation

        r.ai.timer-=1*scale;

        // När halva windupen passerat → träffen går igenom
        if (r.ai.timer >= Math.floor(RAT_AI.WINDUP_FR/2)) {
          handleCombat(r, ["swordguy"], 10,scale);
          r.ai.state = 'cooldown';
          r.ai.timer = RAT_AI.ATTACK_CD_FR;
        }

        if (r.ai.timer <= 0) {
          r.ai.state = 'cooldown';
          r.ai.timer = RAT_AI.ATTACK_CD_FR;
        }
        break;
      }

      case 'cooldown': {
        r.ai.vx = -0.6 * r.ai.dir; // backa liten bit
        r.ai.timer-=1*scale;
        if (r.ai.timer <= 0) r.ai.state = 'chase';
        break;
      }
    }
    
    // Rörelse + facing
    if(desiredDir === r.ai.dir|| (r.ai.state=='patrol'&&r.ai.tturn==false))r.x += r.ai.vx*scale;

    r.fliped = (r.ai.dir < 0);
   // r.direction = r.fliped ? 'left' : 'right';
    
    
  }
}
function updatePhysics(obj,scale,player){
  // Gravitation
  if(player && climb==true){obj.vy=0;}else if(obj.vy<0)obj.vy += 1.2*scale;         // grav styrka
  
  
  //if (obj.vy > 11) obj.vy = 11; // clamp fallhastighet

  // Rörelse
  obj.x += obj.vx*scale;
  obj.y += obj.vy*scale;

  // Friktion på marken
  if (game.collideswith(obj,"any","down")||game.collideswiths(obj,"water2")){
    //obj.vy = 0;
    //obj.y = Math.floor(obj.y/32)*32 - obj.h; // snap to tile
    obj.vx *= Math.pow(0.85,scale); // bromsa horisontellt
    if (Math.abs(obj.vx)<0.2) obj.vx = 0;
  }
}

function groundSnapGhost(o, oldY){

    if(game.collideswith(o,"any","ghost")){o.y=o.y-o.dimx;return true;}
    
    return false;

}
function getWaterAt(o){
  const waters = game.getobjecttype("water2")?.objects || [];
  for (const w of waters){
    const overlapX = (o.x + o.dimx > w.x) && (o.x < w.x + w.dimx);
    const overlapY = (o.y + o.dimy > w.y) && (o.y < w.y + w.dimy);
    if (overlapX && overlapY) return w;
  }
  return null;
}


function updateLoot(player,scale){
  const sets = [game.getobjecttype("coin"), game.getobjecttype("apple")];

  for (const type of sets){
    const arr = type?.objects || [];

    for (let i = arr.length - 1; i >= 0; --i){
      const o = arr[i];
      
      if(o.t==null){

        if (type === game.getobjecttype("coin") && game.collideswith(o,"swordguy","ghost")){
          game.removeobject(type, o);
          coins++;
          audio2("sounds/coin.mp3");
          continue;
        }
        if (type === game.getobjecttype("apple") && game.collideswith(o,"swordguy","ghost")){
          game.removeobject(type, o);
          player.health = Math.min(player.maxhealth, player.health + 10);
          audio2("sounds/apple.mp3");
          continue;
        }
      

      }
      else{
      o.t++;
      if (o.pickDelay > 0) o.pickDelay-=1*scale;
      if (o.despawn != null && o.despawn > 0){
        o.despawn-=1*scale;
        if (o.despawn <= 0){
          game.removeobject(type, o);
          continue;
        }
      }

      const water = getWaterAt(o);

      if (o.state === 'air'){
        const oldY = o.y;

        o.vy += (o.ay*scale || 0.6*scale);
        o.x  += (o.vx*scale || 0);
        o.y  += (o.vy*scale || 0);

        if (water){
          // gå inte direkt till ytan – börja flyta upp mjukt
          o.state = 'floatrise';
          o.vx *= Math.pow(0.6,scale);
          o.vy *= Math.pow(0.2,scale);
          o.waterY = water.y - o.dimy + 2; // mål: strax i ytan
        }
        else if (groundSnapGhost(o, oldY)){
          o.state = 'rest';
          o.vx = 0;
          o.vy = 0;
          o.baseY = o.y;
        }
      }
      else if (o.state === 'floatrise'){
        // bromsa sidled i vatten
        o.vx *= Math.pow(0.96,scale);
        o.x += (o.vx *scale|| 0);

        // flyt upp mjukt mot ytan
        o.y += (o.vy *scale|| 0);
        o.vy -= 0.18*scale;     // uppdrift
        if (o.vy < -2.2) o.vy = -2.2;

        // om den lämnar vattnet igen
        const nowWater = getWaterAt(o);
        if (!nowWater){
          o.state = 'air';
        } else {
          o.waterY = nowWater.y - o.dimy + 2;

          if (o.y <= o.waterY){
            o.y = o.waterY;
            o.state = 'float';
            o.baseY = o.y;
            o.vx = 0;
            o.vy = 0;
          }
        }
      }
      else if (o.state === 'float'){
        // guppa på ytan
        const nowWater = getWaterAt(o);
        if (!nowWater){
          o.state = 'air';
        } else {
          o.waterY = nowWater.y - o.dimy + 2;
          o.baseY = o.waterY;
          o.y = o.baseY + Math.sin(o.t * 0.12) * 1.2;
        }

        // lätt magnet i vatten
        const px = player.x + player.dimx/2, py = player.y + player.dimy/2;
        const ox = o.x + o.dimx/2,          oy = o.y + o.dimy/2;
        const dx = px - ox, dy = py - oy;
        const d2 = dx*dx + dy*dy;
        const R = 140;

        if (d2 < R*R){
          const invd = 1 / Math.max(1, Math.sqrt(d2));
          const s = 2.0;
          o.x += dx * invd * s;
          o.y += dy * invd * s * 0.6;
        }
      }
      else { // rest
        o.y = o.baseY + Math.sin(o.t * 0.2) * 0.6;

        const px = player.x + player.dimx/2, py = player.y + player.dimy/2;
        const ox = o.x + o.dimx/2,          oy = o.y + o.dimy/2;
        const dx = px - ox, dy = py - oy;
        const d2 = dx*dx + dy*dy;
        const R = 140;

        if (d2 < R*R){
          const invd = 1 / Math.max(1, Math.sqrt(d2));
          const s = 3.0;
          o.x += dx * invd * s;
          o.y += dy * invd * s;
        }
      }

      // pickup
      if (o.pickDelay <= 0){
        if (type === game.getobjecttype("coin") && game.collideswith(o,"swordguy","ghost")){
          game.removeobject(type, o);
          coins++;
          audio2("sounds/coin.mp3");
          continue;
        }
        if (type === game.getobjecttype("apple") && game.collideswith(o,"swordguy","ghost")){
          game.removeobject(type, o);
          player.health = Math.min(player.maxhealth, player.health + 10);
          audio2("sounds/apple.mp3");
          continue;
        }
      }
    }
}
  }

  const from    = overworldNodes[fromIdx];
  const to      = overworldNodes[curIdx];

  if (overworldPlayer.progress < 1){
    overworldPlayer.progress += overworldPlayer.speed*scale; // 0.02 ≈ 50 frames = ~0.8s
    if (overworldPlayer.progress > 1) overworldPlayer.progress = 1;
  }

  // Lerp mellan from och to
  const t = overworldPlayer.progress;
  overworldPlayer.x = from.x + (to.x - from.x) * t;
  overworldPlayer.y = from.y + (to.y - from.y) * t;

  // Bara acceptera ny input om progress är klar
  if (t >= 1){
    handleOverworldInput();
  }
  
}

function buildAdjList(nodes, edges){
  const adj = Array(nodes.length).fill(0).map(()=>[]);
  for (const [a,b] of edges){ adj[a].push(b); adj[b].push(a); }
  return adj;
}
function isUnlocked(node){
  if (node.id === 0) return true;          // start
  if (!node.prereq || node.prereq.length===0) return true;
  return node.prereq.every(id => overworldNodes[id]?.cleared);
}
function markCleared(id){
  const n = overworldNodes.find(n=>n.id===id);
  if (n) n.cleared = true;
}
function chooseNeighborByInput(ix, iy){
  const cur = overworldNodes[overworldPlayer.node];
  let best=null, bestDot=0;

  for (const ni of OW.adj[overworldPlayer.node]){
    const n = overworldNodes[ni];
    if (!isUnlocked(n)) continue;                 // <<< låsta noder ignoreras
    const vx=n.x-cur.x, vy=n.y-cur.y;
    const len=Math.hypot(vx,vy)||1, dx=vx/len, dy=vy/len;
    const dot = dx*ix + dy*iy;
    if (dot>bestDot){ bestDot=dot; best=ni; }
  }
  return (bestDot>0.5)? best : null;
}

    if(r.ai.hurt!==r.health){r.ai.dir=desiredDir;r.ai.hurt=r.health;}
    
    // ——— LOS (uppdateras inte varje frame)
    if (r.ai.losCD > 0) r.ai.losCD-=1*scale;

      }) ?? true;

     if (desiredDir !== r.ai.dir&&(r.ai.tturn)){
          
          if(r.ai.turnCD==0){r.ai.turnCD = Math.floor(102/scale);}
          if(r.ai.turnCD==1){r.ai.dir   = desiredDir;r.ai.tturn=false;r.ai.state = 'patrol';r.ai.hurt=r.health;}

      }
    
    
    
    
    
    
    
    
    
    switch(r.ai.state){
      case "patrol": {
        // enkel patrull → gå i riktning
        
        r.x += r.ai.dir * ARCHER_AI.SPEED;
        if (game.collideswith(r,"any","left"))  r.ai.dir = +1;
        if (game.collideswith(r,"any","right")) r.ai.dir = -1;

        if (dist < ARCHER_AI.SIGHT_X&&desiredDir===r.ai.dir&&r.ai.canSee){
          r.ai.state = "aim";
          r.ai.tturn=true;
          r.alertT = RAT_AI.ALERT_T_FR;
        }
        break;
      }

      case "aim": {
     
         if (dist < ARCHER_AI.ATTACK_RANGE && r.ai.timer<=0&&desiredDir===r.ai.dir&&r.ai.canSee){
          r.ai.state = "windup";
          r.ai.timer = ARCHER_AI.WINDUP_FR;
          r.animation = 1; // sikta
        }
        else r.ai.state="patrol";
        break;
      }

      case "windup": {
        r.ai.timer-=1*scale;
        r.animation = 1; // “dra strängen”
        if (r.ai.timer<=0){
          shootArrow(r.x, r.y, r.ai.dir,scale);
          r.ai.state="cooldown";
          r.ai.timer=ARCHER_AI.COOLDOWN_FR;
        }
        break;
      }

      case "cooldown": {
        r.ai.timer-=1*scale;
        r.animation = 0; // idle
        if (r.ai.timer<=0) r.ai.state="aim";
        break;
      }
    }
  }
}

          if (game.collideswith(r,'any','right')) r.ai.dir = -1;

        // Attack bara när:

           r.animation = 1;

        break;

      case 'windup': {
        r.ai.vx = 0;

        r.ai.timer-=1*scale;

        // När halva windupen passerat → träffen går igenom
        if (r.ai.timer >= Math.floor(RAT_AI.WINDUP_FR/2)) {
          handleCombat(r, ["swordguy"], 10,scale);
          r.ai.state = 'cooldown';
          r.ai.timer = RAT_AI.ATTACK_CD_FR;
        }

        if (r.ai.timer <= 0) {
          r.ai.state = 'cooldown';
          r.ai.timer = RAT_AI.ATTACK_CD_FR;
        }
        break;
      }

      case 'cooldown': {
        r.ai.vx = -0.6 * r.ai.dir*scale; // backa liten bit

    r.direction = r.fliped ? 'left' : 'right';
  }
}
function attackFromFront(attacker, defender){
  // Riktningen defendern tittar åt
  const ddir = defender.fliped ? -1 : 1;

  // Delta mellan attacker och defender
  const dx = (attacker.x + attacker.dimx/2) - (defender.x + defender.dimx/2);

  // Om attacker är framför shielden (i samma riktning som defender tittar)
  return (dx * ddir > 0);
}

const BAT_AI = {
  SIGHT_X:        460,  // ser spelaren
  SIGHT_Y:        840,
  HOVER_SPEED:    1.6,
  SWOOP_SPEED:    6.6,
  RETREAT_SPEED:  3.4,
  HOVER_AMPL:     10,   // sinus-amplitud
  HOVER_FREQ:     0.12, // sinus-hastighet
  SWOOP_COOLDOWN: 40,   // frames mellan dyk
  CONTACT_DMG:    8,
};

function initBat(b){
  if (b.ai) return;
  b.dual=5;
  b.ai = {
    state: 'perch', // 'perch' | 'hover' | 'swoop' | 'retreat' | 'cooldown'
    dir: (b.fliped ? -1 : 1),
    t: 0,
    cd: 0,
    homeY: b.y,          // baseline för hover/retreat
  };
  b.vx = 0; b.vy = 0;    // flygare – ingen grav
}

function updateBats(scale){
  const bats = game.getobjecttype("bat")?.objects || [];
  const player = game.getobjecttype("swordguy")?.objects?.[0];
  if (!player) return;

  for (const b of bats){
    initBat(b);
    if(!b.isonscreen)continue;  
    const dx = player.x - b.x;
    const dy = player.y - b.y;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    const sgn = dx < 0 ? -1 : 1;
    b.fliped = (sgn < 0);
    b.direction = b.fliped ? "left":"right";

    if (b.ai.cd > 0) b.ai.cd-=1*scale;
    b.ai.t+=1*scale;

    const sees = (adx < BAT_AI.SIGHT_X && ady < BAT_AI.SIGHT_Y);
        
        
    switch (b.ai.state){

      case 'perch': { // hänger “sovande”
        b.fliped = (sgn > 0);
        b.direction = b.fliped ? "left":"right";      
        b.animation=0;
        b.rot=180;
        b.vx = b.vy = 0;
        if (sees) {
          b.ai.state = 'hover';
          b.ai.homeY = b.y; // dra upp lite innan hover
        }
        break;
      }

      case 'hover': { // sväva i sinus, håll avstånd horisontellt
        b.animation=1;  
        b.rot=0;
        b.vx = sgn * BAT_AI.HOVER_SPEED * 0.6*scale;
        b.vy = Math.sin(b.ai.t * BAT_AI.HOVER_FREQ) * 0.6*scale;

        // undvik väggar lätt
        if (game.collideswith(b,"any","left"))  b.vx = Math.abs(b.vx*scale);
        if (game.collideswith(b,"any","right")) b.vx = -Math.abs(b.vx*scale);

        // starta swoop när rätt avstånd
        if (sees && b.ai.cd <= 0 && adx < 180){
          b.ai.state = 'swoop';
        } else if (!sees){
          // tappa target → glid tillbaka mot homeY
          b.vy += (b.ai.homeY - b.y) * 0.02*scale;
        }
        break;
      }

      case 'swoop': { // dyk mot spelarens position
        b.animation=0;  
        b.rot=0;
        const len = Math.max(1, Math.hypot(dx, dy));
        b.vx = (dx/len) * BAT_AI.SWOOP_SPEED;
        b.vy = (dy/len) * BAT_AI.SWOOP_SPEED;

        // Om vi passerat under spelaren eller nära → gå till retreat
        if (b.y > player.y + 10 || len < 24){
          b.ai.state = 'retreat';
          b.ai.cd = BAT_AI.SWOOP_COOLDOWN;
        }
        break;
      }

      case 'retreat': { // dra uppåt till baseline
        b.animation=1;
        b.rot=0;
        // uppåt + bort lite
        b.vx = -sgn * BAT_AI.RETREAT_SPEED * 0.6*scale;
        b.vy = -BAT_AI.RETREAT_SPEED*scale;

        // när vi är tillbaka nära homeY → hover

function updateMages(scale){

    if(Math.abs(dx)>10)r.fliped = dir<0;

         dir = dx<0 ? -1 : 1;

function updateWarlocks(scale){
  const W = game.getobjecttype('warlock')?.objects || [];
  const P = game.getobjecttype('swordguy')?.objects?.[0];
  if (!P) return;

  for (const b of W){
    initWarlock(b);

    if(audio.src.endsWith("drak.mp3")){}
    else if(b.isonscreen&&!audio.src.endsWith("drak.mp3")&&!audio.src.endsWith("win.mp3")){audio.src = "sounds/drak.mp3";audio.play();}
    
    const hpPct = b.health / b.maxHealth;
    
    if(hpPct <= 0.10 && b.ai.phase===2){b.ai.cd = 140;}
    
    b.ai.phase = (hpPct > 0.70) ? 1 : (hpPct > 0.10 ? 2 : 3);

    // grundriktning mot spelaren
    const dx = P.x - b.x-b.dimx/3, dy = P.y - b.y;
    const dir = dx < 0 ? -1 : 1;
    b.fliped = (dir<0);
    b.direction = b.fliped ? 'left':'right';

    // timers
    if (b.ai.timer>0) b.ai.timer-=1*scale;
    if (b.ai.cd>0) b.ai.cd-=1*scale;
    if (b.ai.tpCD>0) b.ai.tpCD-=1*scale;
    if (b.ai.summonCD>0) b.ai.summonCD-=1*scale;
    
    

    // enkel “grav” så han står på mark
    b.y += 11; b.dual = 50;

    switch(b.ai.state){

      case 'idle': {
        // glid långsamt i sidled för att hålla liv i fighten
        b.x += dir * WARLOCK_AI.SPEED * 0.5*scale;

        // fasbeteende
        if (b.ai.phase===1){
          if (b.ai.cd<=0){ if (Math.random()<0.5) startCast(b, 'fireball');
            else startCast(b, 'pillar'); }
        } else if (b.ai.phase===2){
          // teleporta ibland + fireball / pillar
          if (b.ai.tpCD<=0 && Math.random()<0.02){
            doTeleport(b, P);
            b.ai.tpCD = WARLOCK_AI.TELEPORT_CD_FR;
          } else if (b.ai.summonCD<=0){
            startCast(b, 'summon');
            b.ai.summonCD = WARLOCK_AI.SUMMON_CD_FR;
          } else if (b.ai.cd<=0){
            if (Math.random()<0.5) startCast(b, 'fireball');
            else startCast(b, 'pillar');
          }
        } else { // phase 3
            updateShieldCycle(b); // sköter flash+state

            if (b.ai.cd<=0){
              if (Math.random()<0.45) startCast(b, "tri_fire");
              else startCast(b, "dash");
            }

        break;

      case 'windup': {
        if (b.ai.timer <= 0){
          const handled = resolveCast(b, P, dir,scale); // boolean
          if (!handled){                          // endast enkla casts
            b.ai.state = 'cooldown';
            b.ai.timer = WARLOCK_AI.COOLDOWN_FR;
          }

        break;
      }

      case 'cooldown': {
        if (b.ai.timer<=0){
          b.ai.state='idle';
          b.ai.cd = 140; // liten allmän CD
        }
        break;
      }

      case 'dash': {
        b.x += b.ai.dashDir * WARLOCK_AI.DASH_SPEED;

        // skada spelaren vid kontakt
        if (game.collideswith(b, 'swordguy','ghost')){

    if (b.ai.phase===3 && b.ai.shieldUp && b.ai.shieldT<=0) b.ai.shieldUp=false;
  }

// enkel scheduler (ramräknare). Kör i din mainloop: runScheduled()
let _sched = [];
function schedule(fn, delay){ _sched.push({fn, t:delay}); }
function runScheduled(){
  for (let i=_sched.length-1;i>=0;--i){
    const s=_sched[i]; s.t--;
    if (s.t<=0){ try{s.fn();}finally{_sched.splice(i,1);} }
  }
}

// teleport – kort blink till en plats 140px åt valfri sida med fri mark
function doTeleport(b, P) {
  const dirs = Math.random() < 0.5 ? [-1, 1] : [1, -1];
  const offsetsY = [0, -32, -64, 32];

  for (const dir of dirs) {
    const baseX = b.x + dir * 640;

    for (const offY of offsetsY) {
      const nx = baseX;
      const ny = b.y + offY;

      if (canTeleportTo(b, nx, ny)) {
        b.x = nx;
        b.y = ny;
        cameraShake(3, 120);
        return true;
      }
    }
  }

  return false;
}
function canTeleportTo(obj, x, y) {
  const gs = window.G5?.gridStat;
  if (!gs) return false;

  const test = {
    x: x,
    y: y,
    w: obj.dimx,
    h: obj.dimy,
    rot: obj.rot || 0
  };

  const aabb = { x:test.x, y:test.y, w:test.w, h:test.h };
  const near = gs.query(aabb, []);

  for (let i = 0; i < near.length; i++) {
    const S = near[i];

    // snabb AABB-check först
    const sa = S._aabb || { x:S.x, y:S.y, w:S.w, h:S.h };
    if (
      !(aabb.x + aabb.w <= sa.x ||
        sa.x + sa.w <= aabb.x ||
        aabb.y + aabb.h <= sa.y ||
        sa.y + sa.h <= aabb.y)
    ) {
      // exaktare check om du vill
      if ((S.rot || 0) === 0 && (test.rot || 0) === 0) {
        return false;
      } else {
        if (obbObbMTV(test, S)) return false;
      }
    }
  }

  return true;
}


//=== resolveCast: ersätt bara 'pillar'-fallet ===
function resolveCast(b, P, dir,scale){
  const type = b.ai.castType; 
  b.animation = 2;

  if (type==='fireball'){
    shootFireballFrom(b, dir, 0,scale);
    return false;
  }
  if (type==='tri_fire'){
    shootFireballFrom(b, dir, -0.18,scale);
    shootFireballFrom(b, dir,  0,scale);
    shootFireballFrom(b, dir, +0.18,scale);
    return false;
  }
  if (type==='pillar'){
    castFirePillarsAtTarget(P);   // <— NY
    return false;
  }
  if (type==='summon'){
    summonMinionsNear(b);
    return false;
  }
  if (type==='dash'){
    b.ai.state  = 'dash';
    b.ai.dashDir = dir;
    b.ai.timer  = WARLOCK_AI.DASH_FR;
    return true;
  }
}

function castFirePillarsAtTarget(target){
  const w = (target?.dimx || 32);
  const h = (target?.dimy || 32);
  const centerX = (target?.x || 0) + w/2;
  const groundY = (target?.y || 0) + h; // fötter vid cast-ögonblicket

    const x = centerX + (i-1)*WARLOCK_AI.PILLAR_SPACING;

  }

// === Spawner: lås X; starta högt upp, väx nedåt ===
function spawnFirePillar(xCenter, groundY){
  const PILL = game.getobjecttype('firepillar');
  if (!PILL) return;

  const w = WARLOCK_AI.PILLAR_WIDTH;
  const startH = WARLOCK_AI.PILLAR_START_MIN +
                 Math.random()*(WARLOCK_AI.PILLAR_START_MAX - WARLOCK_AI.PILLAR_START_MIN);
  const startY = groundY - startH;           // 600–800 px ovanför fötter

  // Vi börjar med en mark-telegraph (tunn linje på marken)
  const p = game.addobject(PILL, xCenter - w/2, groundY - 4, w, 4, 0, false);

  // Lås X och stäng av fysik så den aldrig glider
  p.lockX = xCenter - w/2;
  p.vx = p.vy = p.ax = p.ay = 0;
  p.ghost = true;
  p.rot = 0; p.fliped = false;

  // interna fält
  p.mode       = 'telegraph';
  p.t          = WARLOCK_AI.PILLAR_TELEGRAPH_FR;
  p.animation  = 0;

  // fall/kolonn-data
  p.startY     = startY;          // översta Y (fix)
  p.groundY    = groundY;         // dit vi växer
  p.fullH      = groundY - startY; // totala höjden när klar
  p.tipH       = WARLOCK_AI.PILLAR_TIP_H;
  p.curH       = 0;               // nuvarande höjd (växer från 0 → fullH)
  p.growPerFr  = (groundY - startY) / WARLOCK_AI.PILLAR_DESCENT_FR;
  p.lingerT    = WARLOCK_AI.PILLAR_LINGER_FR;
  p.hitCD=0;
}

// === Uppdatering: väx nedåt, skada bara i spetsen, lås X varje frame ===
function updateFirePillars(scale){
  const PILL = game.getobjecttype('firepillar');
  const P    = game.getobjecttype('swordguy')?.objects?.[0];
  if (!PILL) return;

  const Pw = (P?.dimx || 32), Ph = (P?.dimy || 32);
  const overlap = (ax,ay,aw,ah,bx,by,bw,bh) =>
    (ax < bx + bw) && (ax + aw > bx) && (ay < by + bh) && (ay + ah > by);

  for (let i=PILL.objects.length-1; i>=0; --i){
    const p = PILL.objects[i];

    // Lås X + nolla fysik
    p.x = p.lockX;
    p.vx = p.vy = p.ax = p.ay = 0;

    if (p.mode === 'telegraph'){
      p.animation = 0;
      p.t-=1*scale;
      // (valfritt: blinka bredd/alpha här)
      if (p.t <= 0){
        // Växande kolonn: placera överst och börja med 0 höjd
        p.mode = 'fall';
        p.animation = 0;
        p.curH = 0;
        p.dimx = WARLOCK_AI.PILLAR_WIDTH;
        p.dimy = 0;                // börjar osynlig
        p.y    = p.startY;         // takposition (fix)
      }
      continue;
    }

    if (p.mode === 'fall'){
      // Väx nedåt genom att öka höjden
      p.curH += p.growPerFr*scale;
      if (p.curH > p.fullH) p.curH = p.fullH;

      // Kolonnens hitbox = hela det som syns
      p.dimx = WARLOCK_AI.PILLAR_WIDTH;
      p.dimy = p.curH;
      p.y    = p.startY; // toppläget är konstant, vi växer nedåt

      // Spetsens hitbox: nedersta tipH
      if (p.curH >= p.tipH){
        const tipY = p.startY + p.curH - p.tipH;
        if (P && overlap(p.x, tipY, p.dimx, p.tipH, P.x, P.y, Pw, Ph)){
            
            
           if (!p.hitCD || p.hitCD <= 0){
            handleCombat(p, ["swordguy"], 10,scale); // din funktion


             p.hitCD = 30;
           }
           if (p.hitCD && p.hitCD > 0) p.hitCD-=1*scale;  
            
            
          
          P.vy = -3; P.vx = (P.x < (p.x + p.dimx/2) ? -2 : 2);
        }
      }

      // Träffat mark/fötter → linger
      if (p.curH >= p.fullH){
        p.mode = 'linger';
        p.animation = 0;
        // låt dimy vara hela kolonnens höjd; y förblir startY
      }
      continue;
    }

    if (p.mode === 'linger'){
      p.lingerT--;
      if (P && game.collideswith(p, 'swordguy', 'ghost')){
        if (!p.hitCD || p.hitCD <= 0){  
            handleCombat(p, ["swordguy"], 10,scale);
            p.hitCD = 30;
        }
        if (p.hitCD && p.hitCD > 0) p.hitCD--;  
      }
      if (p.lingerT <= 0){
        game.removeobject(PILL, p);
      }
    }
  }
}

function giantRatfishClampToRoom(b,scale){
  let hitWall = false;

  if (b.roomLeft != null && b.x < b.roomLeft){
    b.x = b.roomLeft;
    hitWall = true;
  }
  if (b.roomRight != null && b.x + b.dimx > b.roomRight){
    b.x = b.roomRight - b.dimx;
    hitWall = true;
  }
  if (b.roomTop != null && b.y < b.roomTop){
    b.y = b.roomTop;
    b.vy *= Math.pow(-0.2,scale);
  }
  if (b.roomBottom != null && b.y + b.dimy > b.roomBottom){
    b.y = b.roomBottom - b.dimy;
    b.vy *= Math.pow(-0.2,scale);
  }

  if(hitWall && b.ai?.state === "charge"){
    b.ai.state = "stunned";
    b.ai.timer = GIANT_RATFISH_AI.STUN_FR;
    b.ai.weakOpen = true;
    b.vx = 0;
    b.vy = 0;
    b.flashTimer = 8;
    b.flashTimercolor = "rgba(255,255,255,0.7)";
    cameraShake(8,180);

    for(let i=0;i<10;i++){
      giantRatfishSpawnBubble(b,scale);
    }
  }else if(hitWall){
    b.vx *= Math.pow(-0.3,scale);
  }
}
function initGiantRatfish(b){
  if (b.ai) return;

  b.maxhealth = GIANT_RATFISH_AI.HP;
  b.health = b.maxhealth;

  b.ai = {
    state: 'idle',
    dir: (b.fliped ? -1 : 1),
    timer: 0,
    cd: 60,
    phase: 1,
    bubbleCD: 0,
    started: false,
    weakOpen: false
  };

  b.vx = 0;
  b.vy = 0;

  if (b.hitcd == null) b.hitcd = 0;

  // sätt egna bounds på objektet i editor om du vill
        const bounds = giantRatfishAutoBounds(b);

        if (bounds){
          b.roomLeft = bounds.left;
          b.roomRight = bounds.right;
          b.roomTop = bounds.top;
          b.roomBottom = bounds.bottom;
        }else{
          // fallback om raycast inte finns
          b.roomLeft = b.x - 900;
          b.roomRight = b.x + 900;
          b.roomTop = b.y - 350;
          b.roomBottom = b.y + 350;
        }
}
function updateGiantRatfish(scale){
  const B = game.getobjecttype('giantratfish')?.objects || [];
  const P = game.getobjecttype('swordguy')?.objects?.[0];
  if (!P) return;

  for (const b of B){
    //if(!b.isonscreen) continue;
    if(b.isonscreen&&!audio.src.endsWith("boss2.mp3")){audio.src = "sounds/boss2.mp3";audio.play();}
    initGiantRatfish(b);

    b.dual = 45;
    b.backwarddual=true;
    if (b.ai.bubbleCD > 0) b.ai.bubbleCD-=1*scale;
    if (b.ai.cd > 0) b.ai.cd-=1*scale;
    if (b.hitcd > 0) b.hitcd-=1*scale;

    const dx = (P.x + P.dimx/2) - (b.x + b.dimx/2);
    const dy = (P.y + P.dimy/2) - (b.y + b.dimy/2);
    const len = Math.hypot(dx, dy) || 1;
    
    if(!b.ai.weakOpen){
        if (dx < -5) b.fliped = true;
        else if (dx > 5) b.fliped = false;
    }
    if (b.health <= b.maxhealth * GIANT_RATFISH_AI.PHASE2_AT && b.ai.phase === 1){
      b.ai.phase = 2;
      b.ai.cd = 40;
      b.flashTimer = 10;
      b.flashTimercolor = "rgba(255,80,80,0.5)";
      cameraShake(6,140);
    }

    if(!b.ai.started && Math.abs(dx) < GIANT_RATFISH_AI.START_RANGE){
      b.ai.started = true;
      b.ai.state = "patrol";
      b.ai.timer = 0;
    }

    if(!b.ai.started) continue;

    if (b.ai.bubbleCD <= 0){
      giantRatfishSpawnBubble(b,scale);
      b.ai.bubbleCD = GIANT_RATFISH_AI.BUBBLE_CD_FR;
    }

    switch (b.ai.state){

      case 'idle': {
        b.vx *= Math.pow(0.9,scale);
        b.vy *= Math.pow(0.9,scale);
        break;
      }

      case 'patrol': {
        const spd = (b.ai.phase === 1) ? GIANT_RATFISH_AI.SPEED : GIANT_RATFISH_AI.PHASE2_SPEED;

        b.vx *= Math.pow(0.94,scale);
        b.vy *= Math.pow(0.94,scale);

        b.vx += (dx / len) * 0.16*scale;
        b.vy += (dy / len) * 0.09*scale;

        if (b.vx > spd) b.vx = spd*scale;
        if (b.vx < -spd) b.vx = -spd*scale;
        if (b.vy > 2.0) b.vy = 2.0*scale;
        if (b.vy < -2.0) b.vy = -2.0*scale;

        handleCombat(b, ["swordguy"], GIANT_RATFISH_AI.CONTACT_DMG,scale);

        if (len < 900 && b.ai.cd <= 0){
            b.ai.state = 'windup';
            b.ai.timer = GIANT_RATFISH_AI.WINDUP_FR;
            b.vx *= Math.pow(0.5,scale);
            b.vy *= Math.pow(0.5,scale);
          }
        break;
      }

      case 'windup': {
        b.vx *= Math.pow(0.88,scale);
        b.vy *= Math.pow(0.88,scale);

        b.vx += -(dx / len) * 0.12*scale;
        b.vy += -(dy / len) * 0.05*scale;

        b.flashTimer = 4;
        b.flashTimercolor = "rgba(255, 80, 80, 0.45)";

        b.ai.timer-=1*scale;
        if (b.ai.timer <= 0){
          const cspd = (b.ai.phase === 1) ? 13 : 16;

          b.vx = (dx / len) * cspd;
          b.vy = (dy / len) * (cspd * 0.45);

          b.ai.state = 'charge';
          b.ai.timer = (b.ai.phase === 1) ? GIANT_RATFISH_AI.CHARGE_FR : GIANT_RATFISH_AI.PHASE2_CHARGE_FR;
          b.ai.weakOpen = false;
          cameraShake(7,120);
        }
        break;
      }

      case 'charge': {
        handleCombat(b, ["swordguy"], GIANT_RATFISH_AI.CHARGE_DMG,scale);

        b.vx *= Math.pow(0.995,scale);
        b.vy *= Math.pow(0.995,scale);

        b.ai.timer-=1*scale;
        if (b.ai.timer <= 0){
          b.ai.state = 'recover';
          b.ai.timer = GIANT_RATFISH_AI.RECOVER_FR;
          b.ai.cd = 55;
        }
        break;
      }

      case 'recover': {
        handleCombat(b, ["swordguy"], GIANT_RATFISH_AI.CONTACT_DMG,scale);

        b.vx *= Math.pow(0.90,scale);
        b.vy *= Math.pow(0.90,scale);

        b.ai.timer--;
        if (b.ai.timer <= 0){
          b.ai.state = 'patrol';
          b.ai.weakOpen = false;
        }
        break;
      }

      case 'stunned': {
        b.vx *= Math.pow(0.82,scale);
        b.vy *= Math.pow(0.82,scale);

        b.flashTimer = 5;
        b.flashTimercolor = "rgba(255,255,255,0.55)";

        b.ai.timer-=1*scale;
        if (b.ai.timer <= 0){
          b.ai.state = 'patrol';
          b.ai.cd = 45;
          b.ai.weakOpen = false;
        }
        break;
      }
    }

    b.x += b.vx*scale;
    b.y += b.vy*scale;

    giantRatfishClampToRoom(b,scale);
  }
}

function giantRatfishAutoBounds(b){
  const gs = window.G5?.gridStat;
  const rc = window.G5?.raycastStatics;
  if (!gs || !rc) return null;

  const cx = b.x+b.dimx/2 ;
  const cy = b.y ;

  const maxX = 7000;
  const maxY = 7000;

  const hitL = rc(gs, cx, cy, cx - maxX, cy, { pad: 1 });
  const hitR = rc(gs, cx, cy, cx + maxX, cy, { pad: 1 });
  const hitU = rc(gs, cx, cy, cx, cy - maxY, { pad: 1 });
  const hitD = rc(gs, cx, cy, cx, cy + maxY, { pad: 1 });

  const padX = 24;
  const padY = 24;

  let left   = b.x - 900;
  let right  = b.x + 900;
  let top    = b.y - 350;
  let bottom = b.y + 350;

  if (hitL && hitL.x != null) left = 100+hitL.x + padX+b.dimx/4;
  if (hitR && hitR.x != null) right = hitR.x - padX+b.dimx/4;
  if (hitU && hitU.y != null) top = hitU.y + padY+b.dimy;
  if (hitD && hitD.y != null) bottom = hitD.y - padY;



  return { left, right, top, bottom };
}
const BATBOSS_AI = {
  SIGHT_X: 900,
  SIGHT_Y: 900,
  HOVER_SPEED: 1.6,
  HOVER_FREQ: 0.08,
  SWOOP_SPEED: 6.6,
  RETREAT_SPEED: 3.4,
  SWOOP_COOLDOWN: 70
  

  
};
function updateBatBoss(scale){
  const bats = game.getobjecttype("batboss")?.objects || [];
  const player = game.getobjecttype("swordguy")?.objects?.[0];
  if (!player) return;

  for (const b of bats){
    initBat(b);
    if(!b.isonscreen) continue;

    const dx = player.x - b.x;
    const dy = player.y - b.y;
    const adx = Math.abs(dx), ady = Math.abs(dy);
    const sgn = dx < 0 ? -1 : 1;

    b.fliped = (sgn < 0);
    b.direction = b.fliped ? "left" : "right";

    if (b.ai.cd > 0) b.ai.cd -= 1 * scale;
    b.ai.t += 1 * scale;

    const sees = (adx < BATBOSS_AI.SIGHT_X && ady < BATBOSS_AI.SIGHT_Y);

    switch (b.ai.state){

      case 'perch': {
        b.animation = 0;
        b.rot = 180;
        b.vx = 0;
        b.vy = 0;

        if (sees){
          b.ai.state = 'hover';
          b.ai.homeY = b.y;
        }
        break;
      }

      case 'hover': {
        b.animation = 1;
        b.rot = 0;

        b.vx = sgn * BATBOSS_AI.HOVER_SPEED * 0.6;
        b.vy = Math.sin(b.ai.t * BATBOSS_AI.HOVER_FREQ) * 1.2;

        if (game.collideswith(b,"any","left"))  b.vx = Math.abs(b.vx);
        if (game.collideswith(b,"any","right")) b.vx = -Math.abs(b.vx);

        if (sees && b.ai.cd <= 0 && adx < 260){
          b.ai.state = 'swoop';
        } 
        else if (!sees){
          b.vy += (b.ai.homeY - b.y) * 0.02 * scale;
        }
        break;
      }

      case 'swoop': {
        b.animation = 0;
        b.rot = 0;

        const len = Math.max(1, Math.hypot(dx, dy));
        b.vx = (dx / len) * BATBOSS_AI.SWOOP_SPEED;
        b.vy = (dy / len) * BATBOSS_AI.SWOOP_SPEED;

        if (b.y > player.y + 20 || len < 32){
          b.ai.state = 'retreat';
          b.ai.cd = BATBOSS_AI.SWOOP_COOLDOWN;
        }
        break;
      }

      case 'retreat': {
        b.animation = 1;
        b.rot = 0;

        b.vx = -sgn * BATBOSS_AI.RETREAT_SPEED * 0.6;
        b.vy = -BATBOSS_AI.RETREAT_SPEED;

        if (b.y <= b.ai.homeY){
          b.y = b.ai.homeY;
          b.ai.state = 'hover';
        }
        break;
      }
    }

    b.x += b.vx * scale;
    b.y += b.vy * scale;

    if (!b.hitCD || b.hitCD <= 0){
      handleCombat(b, ["swordguy"], 2, scale);
      b.hitCD = 25;
    }
    if (b.hitCD && b.hitCD > 0) b.hitCD -= 1 * scale;
  }
}
function updateGladiator(scale){
    const arr = game.getobjecttype("gladiator")?.objects || [];
    const player = game.getobjecttype("swordguy")?.objects?.[0];
    if (!player) return;

    for (const g of arr){
        if (g.health <= 0) continue;

        if (g.aiInit == null){
            g.aiInit = 1;
            g.vx = 0;
            g.vy = 0;
            g.jumpCooldown = 0;
            g.attackCooldown = 0;
            g.state = "walk";
            g.speed = 0.35;
            g.jumpPower = -12;
            g.gravity = 0.6;
            g.maxFall = 14;
            g.attackRange = 300;
            g.jumpMinRange = 180;
            g.jumpMaxRange = 450;
            g.facing = "left";
            g.dual=10;
            
        }

        const dx = player.x - g.x;
        const dy = player.y - g.y;
        const adx = Math.abs(dx);

        // facing
        g.fliped = dx < 0 ? true : false;

        // cooldowns
        if (g.jumpCooldown > 0) g.jumpCooldown -= 1 * scale;
        if (g.attackCooldown > 0) g.attackCooldown -= 1 * scale;

        // gravity
        g.vy += g.gravity * scale;
        if (g.vy > g.maxFall) g.vy = g.maxFall;

        // står han på mark?
        const onGround = !!game.collideswith(g, "any", "down");

        // enkel state machine
        if (g.state == "walk"){
            // nära = attack
            if (adx < g.attackRange && g.attackCooldown <= 0 && onGround){
                g.state = "attack";
                g.attackTimer = 22;
                g.vx *= 0.5;
            }
            // mellanavstånd = hoppa mot spelaren ibland
            else if (
                adx > g.jumpMinRange &&
                adx < g.jumpMaxRange &&
                g.jumpCooldown <= 0 &&
                onGround
            ){
                g.state = "jump";
                g.vy = g.jumpPower;

                // hoppa mot spelaren
                g.vx = dx < 0 ? -4.2 : 4.2;

                g.jumpCooldown = 90;
            }
            else{
                // vanlig gång
                const dir = dx < 0 ? -1 : 1;
                g.vx += dir * g.speed * scale;

                // bromsa lite så han inte glider för mycket
                if (g.vx > 2.0) g.vx = 2.0;
                if (g.vx < -2.0) g.vx = -2.0;
            }
        }
        else if (g.state == "jump"){
            // när han landar -> tillbaka till walk
            if (onGround && g.vy >= 0){
                g.state = "walk";
            }
        }
        else if (g.state == "attack"){
            g.attackTimer -= 1 * scale;
            g.vx *= 0.85;

            // träff-fönster
            if (!g.didHit && g.attackTimer < 12 && g.attackTimer > 7){
                g.didHit = true;

                if (game.collideswiths(g,"swordguy")){
                    handleCombat(g, ["swordguy"], 5);
                }
            }

            if (g.attackTimer <= 0){
                g.didHit = false;
                g.attackCooldown = 35;
                g.state = "walk";
            }
        }

        // friktion om inte i hopp
        if (g.state != "jump"){
            g.vx *= 0.92;
        }

        // rörelse
        g.x += g.vx * scale;
        g.y += g.vy * scale;
    }
}

function lightningCombat(x, damage, scale){
    const hitTypes = ["swordguy","rat","archer","tank","bat","mage","warlock","gladiator"];
    const hitWidth = 120;   // hur bred träffzonen är
    const hitHeight = 2000; // nästan hela höjden

    for (const type of hitTypes){
        
        const arr = game.getobjecttype(type)?.objects || [];
        
        for (let i = arr.length - 1; i >= 0; i--){
            if(arr[i].name=="swordguy")damage=10;
            else damage=100;
            const target = arr[i];
            if (!target || target.health <= 0) continue;

            const tx = target.x + target.dimx / 2;
            const ty = target.y + target.dimy / 2;

            // enkel vertikal kolumn
            if (
                tx >= x - hitWidth/2 &&
                tx <= x + hitWidth/2 &&
                ty >= 0 &&
                ty <= hitHeight
            ){
                // warlock shield? låt blixt ignorera shield eller blocka, välj själv
                // just nu: blixten går igenom allt

                target.health -= damage;
                target.flashTimer = 12 / scale;
                target.flashTimercolor = "rgba(255,255,255,0.9)";

                spawnDamageNumber(-damage, target.x, target.y, { color: "#cfe8ff" });
                spawnHitParticles(target.x + target.dimx/2, target.y + target.dimy/2, 10, "#d8ecff");

                hitStop(2);
                cameraShake(14, 90);

                // knockback bort från strike center
                const dir = (tx < x) ? -1 : 1;
                target.vx = dir * 8;
                target.vy = -12;

                // död
                if (target.health <= 0) {
                    if (target.name == "swordguy"){
                        gameState = 'game_over';
                        audio.currentTime = 0;
                        audio.pause();
                        stateTimer = 150;
                    }

                    const cx = target.x + target.dimx/2;
                    const cy = target.y + target.dimy - 30;

                    const c = game.addobject(game.getobjecttype("coin"), cx, cy, 16, 16, 0, false);
                    c.vx = (Math.random()*2 - 1) * 1.2;
                    c.vy = -6 - Math.random()*2;
                    c.ay = 0.6;
                    c.state = 'air';
                    c.t = 0;
                    c.pickDelay = 10;
                    c.despawn = 60*20;

                    if (Math.random() < 0.3){
                        const a = game.addobject(game.getobjecttype("apple"), cx+8, cy, 16, 16, 0, false);
                        a.vx = (Math.random()*2 - 1) * 1.0;
                        a.vy = -7;
                        a.ay = 0.6;
                        a.state = 'air';
                        a.t = 0;
                        a.pickDelay = 10;
                        a.despawn = 60*25;
                    }

                    if(type == "warlock"){
                        outro = true;
                        audio.src = "sounds/win.mp3";
                        audio.play();
                    } else {
                        game.removeobject(game.getobjecttype(type), target);
                    }
                }
            }
        }
    }
}

}
function updateOverworldShop(scale){
    if(overworldShop.messageTimer > 0){
        overworldShop.messageTimer -= 1 * scale;
        if(overworldShop.messageTimer <= 0){
            overworldShop.message = "";
        }
    }

    if(!overworldShop.open){
        overworldShop.pressLock = false;
        return;
    }

    const ui = getOverworldShopUI();

    if(mousepressed && !overworldShop.pressLock){
        overworldShop.pressLock = true;

        const x = mousex;
        const y = mousey;

        if(pointInRect(x, y, ui.leftBtn.x, ui.leftBtn.y, ui.leftBtn.w, ui.leftBtn.h)){
            overworldShop.selected--;
            if(overworldShop.selected < 0) overworldShop.selected = overworldShop.items.length - 1;
        }
        else if(pointInRect(x, y, ui.rightBtn.x, ui.rightBtn.y, ui.rightBtn.w, ui.rightBtn.h)){
            overworldShop.selected++;
            if(overworldShop.selected >= overworldShop.items.length) overworldShop.selected = 0;
        }
        else if(pointInRect(x, y, ui.buyBtn.x, ui.buyBtn.y, ui.buyBtn.w, ui.buyBtn.h)){
            buyOverworldShopItem();
        }
        else if(pointInRect(x, y, ui.closeBtn.x, ui.closeBtn.y, ui.closeBtn.w, ui.closeBtn.h)){
            overworldShop.open = false;
        }
    }

    if(!mousepressed){
        overworldShop.pressLock = false;
    }
}
function buyOverworldShopItem(){
    const item = overworldShop.items[overworldShop.selected];
    if(!item) return;

    const owned = runBuffs[item.id] || 0;

    if(item.max != null && owned >= item.max){
        overworldShop.message = "MAXED";
        overworldShop.messageTimer = 60;
        return;
    }

    if(coins < item.cost){
        overworldShop.message = "NOT ENOUGH COINS";
        overworldShop.messageTimer = 60;
        return;
    }

    coins -= item.cost;
    runBuffs[item.id] = owned + 1;

    overworldShop.message = "BOUGHT " + item.name;
    overworldShop.messageTimer = 60;
}
function pointInRect(px, py, x, y, w, h){
    return px >= x && px <= x + w && py >= y && py <= y + h;
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight){
    const words = text.split(" ");
    let line = "";
    let yy = y;

    for(let i = 0; i < words.length; i++){
        const test = line + words[i] + " ";
        const w = ctx.measureText(test).width;
        if(w > maxWidth && i > 0){
            ctx.fillText(line, x, yy);
            line = words[i] + " ";
            yy += lineHeight;
        } else {
            line = test;
        }
    }
    ctx.fillText(line, x, yy);
}



function setupOverworldInput(canvas){
    function setPointerPos(clientX, clientY){
        const rect = canvas.getBoundingClientRect();
        const sx = canvas.width / rect.width;
        const sy = canvas.height / rect.height;

        owInput.x = (clientX - rect.left) * sx;
        owInput.y = (clientY - rect.top) * sy;
    }

    canvas.addEventListener("mousedown", (e) => {
        setPointerPos(e.clientX, e.clientY);
        owInput.pressed = true;
        owInput.justPressed = true;
    });

    canvas.addEventListener("mousemove", (e) => {
        setPointerPos(e.clientX, e.clientY);
    });

    window.addEventListener("mouseup", () => {
        owInput.pressed = false;
    });

    canvas.addEventListener("touchstart", (e) => {
        const t = e.touches[0];
        if(!t) return;
        setPointerPos(t.clientX, t.clientY);
        owInput.pressed = true;
        owInput.justPressed = true;
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchmove", (e) => {
        const t = e.touches[0];
        if(!t) return;
        setPointerPos(t.clientX, t.clientY);
        e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", () => {
        owInput.pressed = false;
    });
}

function spawnShockwave(player,scale){
    const rangeX = 160;
    const rangeY = 120;

    const dir = player.fliped ? -1 : 1;

    shockwaveCombat(player, 20, scale);
    spawnShockwaveFX(player);
    spawnShockwaveEffect(player);
 
}
function spawnShockwaveEffect(player){
    const dir = player.fliped ? -1 : 1;

    spawnHitParticles(
        player.x + player.dimx/2 + dir * 60,
        player.y + player.dimy/2,
        10,
        "#cfe8ff"
    );
}
function shockwaveCombat(player, damage, scale){
    const enemyTypes = ["rat","archer","tank","bat","mage","warlock","gladiator"];
    const dir = player.fliped ? -1 : 1;

    const px = player.x + player.dimx/2;
    const py = player.y + player.dimy/2;

    const rangeX = 170;
    const rangeY = 110;

    for (const enemyType of enemyTypes){
        const arr = game.getobjecttype(enemyType)?.objects || [];

        for (let i = arr.length - 1; i >= 0; i--){
            const target = arr[i];
            if (!target || target.health <= 0) continue;

            const tx = target.x + target.dimx/2;
            const ty = target.y + target.dimy/2;

            const dx = tx - px;
            const dy = Math.abs(ty - py);

            // bara framför spelaren
            const inFront = dir === 1
                ? (dx > 0 && dx < rangeX)
                : (dx < 0 && dx > -rangeX);

            if (!inFront) continue;
            if (dy > rangeY) continue;

            // tank-block framifrån
            if (enemyType === "tank"){
                if (attackFromFront(player, target)){
                    spawnHitParticles(target.x+target.dimx/2, target.y+target.dimy/2, 8, "#aaa");
                    continue;
                }
            }

            // warlock shield framifrån
            if (enemyType === "warlock"){
                const front = attackFromFront(player, target);

                if (target.ai?.phase === 3 && front){
                    if (target.ai.shieldState === "on" || target.ai.shieldState === "warn"){
                        target.flashTimer = 6 / scale;
                        target.flashTimercolor = "rgba(168, 199, 255, 0.8)";
                        spawnHitParticles(target.x+target.dimx/2, target.y, 6, "#a8c7ff");
                        cameraShake(2,80);
                        continue;
                    }
                }
            }

            // damage
            target.health -= damage;
            target.flashTimer = 16 / scale;
            target.flashTimercolor = "rgba(220,240,255,0.9)";

            spawnDamageNumber(-damage, target.x, target.y, { color: "#cfe8ff" });
            spawnHitParticles(target.x+target.dimx/2, target.y+target.dimy/2, 8, "#cfe8ff");

            // mindre knockback än vanligt melee
            target.vx = dir * 12;
            target.vy = -10;

            hitStop(2);
            cameraShake(10, 80);

            // död
            if (target.health <= 0){
                if(target.name == "swordguy"){
                    gameState = "game_over";
                    audio.currentTime = 0;
                    audio.pause();
                    stateTimer = 150;
                }

                const cx = target.x + target.dimx/2;
                const cy = target.y + target.dimy - 30;

                const c = game.addobject(game.getobjecttype("coin"), cx, cy, 16, 16, 0, false);
                c.vx = (Math.random()*2 - 1) * 1.2;
                c.vy = -6 - Math.random()*2;
                c.ay = 0.6;
                c.state = "air";
                c.t = 0;
                c.pickDelay = 10;
                c.despawn = 60*20;

                if (Math.random() < 0.3){
                    const a = game.addobject(game.getobjecttype("apple"), cx+8, cy, 16, 16, 0, false);
                    a.vx = (Math.random()*2 - 1) * 1.0;
                    a.vy = -7;
                    a.ay = 0.6;
                    a.state = "air";
                    a.t = 0;
                    a.pickDelay = 10;
                    a.despawn = 60*25;
                }

                if(enemyType == "warlock"){
                    outro = true;
                    audio.src = "sounds/win.mp3";
                    audio.play();
                } else {
                    game.removeobject(game.getobjecttype(enemyType), target);
                }
            }
        }
    }
}
function attackFromFront(attacker, defender){
    const ddir = defender.fliped ? -1 : 1;
    const ax = attacker.x + attacker.dimx/2;
    const dx = ax - (defender.x + defender.dimx/2);
    return (dx * ddir > 0);
}
function spawnShockwaveFX(player){
    if(!game.shockwaves) game.shockwaves = [];

    const dir = player.fliped ? -1 : 1;

    game.shockwaves.push({
        x: player.x + player.dimx/2,
        y: player.y + player.dimy/2,
        dir: dir,
        life: 0,
        maxLife: 20
    });
}
function updateShockwaves(scale){
    if(!game.shockwaves) return;

    for(let i = game.shockwaves.length - 1; i >= 0; i--){
        const s = game.shockwaves[i];

        s.life += 1 * scale;

        if(s.life >= s.maxLife){
            game.shockwaves.splice(i,1);
        }
    }
}
function drawShockwaves(ctx,scale){
    if(!game.shockwaves) return;

    for(const s of game.shockwaves){

        const t = s.life / s.maxLife;

        // storlek växer
        const width = 40 + t * 140;
        const height = 30 + t * 80;

        const alpha = 1 - t;

        ctx.save();

        ctx.globalAlpha = alpha;

        // glow
        ctx.fillStyle = "rgba(200,230,255,0.3)";
        ctx.beginPath();
        ctx.ellipse(
            (s.x + game.maps[game.currentmap].camerax + s.dir * width*0.4) * scale,
            (s.y + game.maps[game.currentmap].cameray) * scale,
            width * scale,
            height * scale,
            0,
            Math.PI * (s.dir === 1 ? -0.5 : 0.5),
            Math.PI * (s.dir === 1 ? 0.5 : 1.5)
        );
        ctx.fill();

        // edge
        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.ellipse(
            (s.x + game.maps[game.currentmap].camerax + s.dir * width*0.4) * scale,
            (s.y + game.maps[game.currentmap].cameray) * scale,
            width * scale,
            height * scale,
            0,
            Math.PI * (s.dir === 1 ? -0.5 : 0.5),
            Math.PI * (s.dir === 1 ? 0.5 : 1.5)
        );
        ctx.stroke();

        ctx.restore();
    }
}
