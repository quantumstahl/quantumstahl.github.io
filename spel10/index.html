function orderWorkerGather(worker, resource, townhallList) {
    if (!worker || !resource) return;
    if (resource.amount <= 0) return;

    worker.targetResource = resource;
    worker.jobType = resource.type;
    worker.targetDropoff = getNearestTownhall(worker, townhallList);
    worker.state = "moveToResource";
}          
function getNearestTownhall(unit, townhallList) {
    let best = null;
    let bestDist = Infinity;

    for (const t of townhallList) {
        if(t.isUnderConstruction)continue;
        const dx = t.x - unit.x;
        const dy = t.y - unit.y;
        const d = dx * dx + dy * dy;
        if (d < bestDist) {
            bestDist = d;
            best = t;
        }
    }
    return best;
}
function updateWorker(worker, townhallList, playerResources, scale) {
    if(worker.dead)return;
    const speed = 1.0;
    

    if (worker.state === "idle") {
        
        return;
    }
    if (worker.state === "buildBuilding") {
      const b = worker.targetBuilding;

      if (!b || b.dead || !b.isUnderConstruction || b.isFinishing) {
          worker.targetBuilding = null;
          worker.state = "idle";
          worker.targetX=null;
          worker.targetY=null;
          
          return;
      }

      if (game.collideswithanoterobject(worker, b)) {

          
        

          b.buildTimer += 1 * scale;
          b.buildProgress = b.buildTimer / b.buildTimeMax;

          if (b.buildProgress >= 1) {
              b.buildProgress = 1;
              b.isUnderConstruction = false;
              b.isFinishing = true;

              finishBuilding(b);

              worker.targetBuilding = null;
              worker.state = "idle";
              worker.targetX=null;
               worker.targetY=null;
          }
          return;
      }

     // worker.standingstill = false;
      ///worker.targetX = b.x + b.dimx / 2;
     /// worker.targetY = b.y + b.dimy / 2;
      return;
  }
    
    if (worker.state === "attackBoar") {
        const b = worker.attackTarget;

        if (!b || b.dead || b.state === "dead" || b.hp <= 0) {
            
            worker.attackTarget = null;
            worker.state = "gather";
            worker.targetResource = b;
            worker.jobType = "food";
            return;
        }

        if (game.collideswithanoterobject(worker, b)) {
            
            worker.standingstill = true;
            worker.attackTimer = (worker.attackTimer || 0) + 1 * scale;

            if (worker.attackTimer >= 60) {
                worker.attackTimer = 0;
                b.hp -= 5;
                b.flashTimer=30;
                if (b.hp <= 0) {
                    b.dead=true;
                    b.type = "food";
                    worker.attackTarget = null;
                    worker.state = "gather";
                    worker.targetResource = b;
                    worker.jobType = "food";
                    
                }
            }
            return;
        }

        worker.standingstill = false;
        worker.targetX = b.x + b.dimx / 2;
        worker.targetY = b.y + b.dimy / 2;
        return;
    }
    if (worker.state === "moveToResource") {
        const r = worker.targetResource;

        if (!r || (r.dead&&r.name!=="sheep"&&r.name!=="boar") || r.amount <= 0) {
            worker.targetResource = null;

            // Har vi redan något med oss? Gå hem först.
            if (worker.carryAmount > 0) {
                worker.targetDropoff = getNearestTownhall(worker, townhallList);
                if (worker.targetDropoff) {
                    worker.state = "returnToBase";
                } else {
                    worker.state = "idle";
                }
            } else {
                // Hitta nästa resurs av samma typ
                const next = getNearestResourceOfType(worker, worker.jobType);
                if (next) {
                    worker.targetResource = next;
                    worker.state = "moveToResource";
                } else {
                    worker.state = "idle";
                    worker.jobType = null;
                }
            }

            worker.standingstill = true;
            return;
        }

        if (game.collideswithanoterobject(worker, r)) {
            worker.state = "gather";
            worker.gatherTimer = 0;
            worker.standingstill = true;
            return;
        }

        worker.standingstill = false;
        worker.targetX = r.x + r.dimx / 2;
        worker.targetY = r.y + r.dimy / 2;
        return;
    }

    if (worker.state === "gather") {
        const r = worker.targetResource;
        
        if (r.name === "sheep"||r.name === "boar") {
       

            
                r.dead = true;
                if(r.name === "sheep")r.animation=12;
                if(r.name === "boar")r.animation=6;
            
        }
        
        else if (!r || r.dead || r.amount <= 0) {
            worker.targetResource = null;

            if (worker.carryAmount > 0) {
                worker.targetDropoff = getNearestTownhall(worker, townhallList);
                if (worker.targetDropoff) {
                    worker.state = "returnToBase";
                } else {
                    worker.state = "idle";
                }
            } else {
                const next = getNearestResourceOfType(worker, worker.jobType);
                if (next) {
                    worker.targetResource = next;
                    worker.state = "moveToResource";
                } else {
                    worker.state = "idle";
                    worker.jobType = null;
                }
            }

            worker.standingstill = true;
            return;
        }

        worker.standingstill = true;
        worker.gatherTimer += 1 * scale;

        if (worker.gatherTimer >= r.gatherTime) {
            worker.gatherTimer = 0;

            const take = Math.min(worker.carryMax - worker.carryAmount, 10, r.amount);
            r.amount -= take;
            worker.carryAmount += take;
            worker.carryType = r.type;

            if (r.amount <= 0) {
                r.dead = true;
                r.animation=100;
                markStaticsDirty();
            }

            if (worker.carryAmount >= worker.carryMax || r.amount <= 0) {
                worker.targetDropoff = getNearestTownhall(worker, townhallList);
                if (worker.targetDropoff) {
                    worker.state = "returnToBase";
                } else {
                    worker.state = "idle";
                }
            }
        }
        return;
    }

    if (worker.state === "returnToBase") {
        const t = worker.targetDropoff;

        if (!t) {
            worker.state = "idle";
            worker.standingstill = true;
            return;
        }

        if (game.collideswithanoterobject(worker, t)) {
            if(t.isUnderConstruction)return;
            worker.state = "deposit";
            worker.standingstill = true;
            return;
        }

        worker.standingstill = false;
        worker.targetX = t.x + t.dimx / 2;
        worker.targetY = t.y + t.dimy / 2;
        return;
    }

    if (worker.state === "deposit") {
        if (worker.carryAmount > 0 && worker.carryType) {
            playerResources[worker.carryType] =
                (playerResources[worker.carryType] || 0) + worker.carryAmount;
        }

        worker.carryAmount = 0;
        worker.carryType = null;

        // Försök fortsätta med samma resurstyp
        if (worker.targetResource  && worker.targetResource.amount > 0) {
            worker.state = "moveToResource";
        } else {
            const next = getNearestResourceOfType(worker, worker.jobType);
            if (next) {
                worker.targetResource = next;
                worker.state = "moveToResource";
            } else {
                worker.state = "idle";
                worker.targetResource = null;
                worker.jobType = null;
            }
        }

        worker.standingstill = true;
        return;
    }
}
function getNearestResourceOfType(unit, type) {
    if (!type) return null;

    const all = game.getAllObjects().filter(o =>
        o.type === type &&
        o.amount > 0 &&
        !o.dead
    );

    let best = null;
    let bestDist = Infinity;

    for (const r of all) {
        const rx = r.x + r.dimx / 2;
        const ry = r.y + r.dimy / 2;
        const dx = rx - unit.x;
        const dy = ry - unit.y;
        const d = dx * dx + dy * dy;

        if (d < bestDist) {
            bestDist = d;
            best = r;
        }
    }

    return best;        
}            
function clearWorkerOrder(worker) {
    worker.state = "idle";
    worker.targetResource = null;
    worker.targetDropoff = null;
    worker.jobType = null;
    worker.gatherTimer = 0;
    worker.targetBuilding = null;
}         
function dist2(a, b) {
    const dx = a.x - b.x;
    const dy = a.y - b.y;
    return dx * dx + dy * dy;
}            
function getNearestWorkerInRange(boar, range) {
    const workers = game.getobjecttype('worker')?.objects || [];
    let best = null;
    let bestDist = range * range;

    for (const w of workers) {
        if (w.dead) continue;
        const d = dist2(boar, w);
        if (d < bestDist) {
            bestDist = d;
            best = w;
        }
    }

    return best;
}            
function moveBoarTowards(boar, tx, ty) {
    boar.targetX = tx;
    boar.targetY = ty;
    boar.standingstill = false;

    const dx = tx - boar.x;
    const dy = ty - boar.y;

    if (Math.abs(dx) > Math.abs(dy)) {
        boar.direction = dx >= 0 ? "right" : "left";
    } else {
        boar.direction = dy >= 0 ? "down" : "up";
    }
}            
function updateBoar(boar, scale) {
    if (boar.dead) return;

    // cooldown
    if (boar.attackCooldown > 0) {
        boar.attackCooldown -= 1 * scale;
        if (boar.attackCooldown < 0) boar.attackCooldown = 0;
    }



    if (boar.state === "idle") {
        const target = getNearestWorkerInRange(boar, boar.aggroRange);
        if (target) {
            boar.targetUnit = target;
            boar.state = "aggro";
            return;
        }

        updatePassiveWander(boar, scale, 70, 80, 200);
        return;
    }

    if (boar.state === "aggro") {
        const t = boar.targetUnit;

        if (!t || t.dead) {
            boar.targetUnit = null;
            boar.state = "return";
            return;
        }

        const dxSpawn = boar.x - boar.spawnX;
        const dySpawn = boar.y - boar.spawnY;
        const dSpawn = Math.hypot(dxSpawn, dySpawn);

        if (dSpawn > boar.leashRange) {
            boar.targetUnit = null;
            boar.state = "return";
            return;
        }

      

        if (game.collideswithanoterobject(boar,t)) {
            boar.state = "attack";
            boar.standingstill = true;
            return;
        }

        moveBoarTowards(boar, t.x, t.y);
        return;
    }

    if (boar.state === "attack") {
        const t = boar.targetUnit;

        if (!t || t.dead) {
            boar.targetUnit = null;
            boar.state = "return";
            return;
        }

     

        if (!game.collideswithanoterobject(boar,t)) {
            boar.state = "aggro";
            return;
        }

        boar.standingstill = true;

        if (boar.attackCooldown <= 0) {
            boar.attackCooldown = 60; // justera
            t.hp = (t.hp || 20) - boar.damage;
             t.flashTimer=30;
            // enkel knockback om du vill
            // t.vx = (dx > 0 ? 1 : -1) * 1.5;
            // t.vy = -1;

            if (t.hp <= 0) {
                t.flashTimer=0;
                t.dead = true;
                playerResources.pop -= 1;
                t.selectable=false;
                t.animation=12;
                boar.targetUnit = null;
                boar.state = "return";
            }
        }

        return;
    }

    if (boar.state === "return") {
        const dx = boar.spawnX - boar.x;
        const dy = boar.spawnY - boar.y;
        const dist = Math.hypot(dx, dy);

        if (dist < 8) {
            boar.x = boar.spawnX;
            boar.y = boar.spawnY;
            boar.state = "idle";
            boar.standingstill = true;
            return;
        }

        moveBoarTowards(boar, boar.spawnX, boar.spawnY);
        return;
    }

    if (boar.state === "dead") {
        boar.standingstill = true;
        return;
    }
}            
function orderWorkerAttackBoar(worker, boar) {
    if (!worker || !boar || boar.state === "dead") return;
    clearWorkerOrder(worker);
    worker.attackTarget = boar;

function updatePassiveWander(unit, scale, radius = 80, waitMin = 40, waitMax = 140) {
    if (unit.dead) return;

    if (unit.spawnX == null) unit.spawnX = unit.x;
    if (unit.spawnY == null) unit.spawnY = unit.y;

    if (unit.wanderTimer == null) unit.wanderTimer = 0;
    if (unit.wanderState == null) unit.wanderState = "wait"; // "wait" | "move"

    if (unit.wanderState === "wait") {
        unit.standingstill = true;
        unit.wanderTimer -= 1 * scale;

        if (unit.wanderTimer <= 0) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * radius;

            unit.wanderTargetX = unit.spawnX + Math.cos(angle) * dist;
            unit.wanderTargetY = unit.spawnY + Math.sin(angle) * dist;

            unit.targetX = unit.wanderTargetX;
            unit.targetY = unit.wanderTargetY;
            unit.wanderState = "move";
        }
        return;
    }

    if (unit.wanderState === "move") {
        const dx = unit.targetX - unit.x;
        const dy = unit.targetY - unit.y;
        const d = Math.hypot(dx, dy);

        if (d < 10) {
            unit.wanderState = "wait";
            unit.wanderTimer = waitMin + Math.random() * (waitMax - waitMin);
            unit.standingstill = true;
            return;
        }

        unit.standingstill = false;

        if (Math.abs(dx) > Math.abs(dy)) {
            unit.direction = dx >= 0 ? "right" : "left";
        } else {
            unit.direction = dy >= 0 ? "down" : "up";
        }
    }
}

       ctx.fillRect(x - 2, y - 2, iconSize + 4, iconSize + 4);

             ctx.fillStyle = "orange";

function isSpawnAreaFree(x, y, w, h) {
    const all = game.getAllObjects();

    for (const o of all) {
        if (o.dead) continue;
        if (!o.selectable) continue; // valfritt filter

        if (
            x < o.x + o.dimx &&
            x + w > o.x &&
            y < o.y + o.dimy &&
            y + h > o.y
        ) {
        
            return false;
        }
    }

    return true;
}            
function getTownhallSpawnPositions(townhall, unitW = 30, unitH = 50) {
    const pad = 20;

    const left = townhall.x - unitW - pad;
    const right = townhall.x + townhall.dimx + pad;
    const top = townhall.y - unitH - pad;
    const bottom = townhall.y + townhall.dimy + pad;
    const midX = townhall.x + townhall.dimx / 2 - unitW / 2;
    const midY = townhall.y + townhall.dimy / 2 - unitH / 2;

    return [
        { x: left,  y: top },     // vänster uppe
        { x: left,  y: midY },    // vänster mitten
        { x: left,  y: bottom },  // vänster nere

        { x: midX,  y: top },     // mitten uppe
        { x: midX,  y: bottom },  // mitten nere

        { x: right, y: top },     // höger uppe
        { x: right, y: midY },    // höger mitten
        { x: right, y: bottom }   // höger nere
    ];
}         
function findFreeSpawnPosition(townhall, unitW = 30, unitH = 50) {
    const spots = getTownhallSpawnPositions(townhall,unitW,unitH);

    for (const p of spots) {
        if (isSpawnAreaFree(p.x, p.y, unitW, unitH)) {
            return p;
        }
    }

    return null;
}

function placeBuilding(x, y, buildingType) {
    const def = BUILDING_TYPES[buildingType];
    if (!def) return false;
   
    if (!canAfford(def.cost)) return false;

    const foundationType = game.getobjecttype(def.imageType);
    if (!foundationType) return false;

    payCost(def.cost);

    const b = game.addobject(foundationType, x, y, def.width, def.height, 0, false);
    if (!b) return false;

    b.selectable = true;
    b.canMove = false;
    b.iscontrollable = false;
    b.isBuilding = true;
    b.isUnderConstruction = true;
    b.state="building";
    b.buildingType = buildingType;
    b.buildProgress = 0;
    b.buildTimer = 0;
    b.buildTimeMax = def.buildTime;
    b.maxHp = def.hp;
    b.hp = 1;
    b.popGranted = false;
    const workers = (game.getobjecttype("worker")?.objects || []).filter(o => o.selected);;
    
    for(const w of workers) {
        clearWorkerOrder(w);
        w.state = "buildBuilding";
        w.targetBuilding = b;
        
       
        w.targetX=b.x+b.dimx/2;
        w.targetY=b.y+b.dimy/2;
        w.selected=false;
        
    }

    markStaticsDirty();
    return b;
}

    const gap = 14;

    selectedWorker.buildButtons = [];

    for (let i = 0; i < WORKER_BUILD_OPTIONS.length; i++) {
        const opt = WORKER_BUILD_OPTIONS[i];
        const bx = startX + i * (bw + gap);

        const canBuy = canAfford(opt.cost);

        ctx.fillStyle = canBuy ? "rgba(80,80,80,0.95)" : "rgba(60,30,30,0.95)";
        ctx.fillRect(bx, by, bw, bh);

        ctx.strokeStyle = canBuy ? "white" : "red";
        ctx.strokeRect(bx, by, bw, bh);

        const img = game.getobjecttype(opt.icon)?.images?.[0]?.getimage();
        if (img) {
            ctx.drawImage(img, bx + 6, by + 6, 28, 28);
        }

        ctx.fillStyle = "white";
        ctx.font = "16px Cinzel";
        ctx.fillText(opt.label, bx + 40, by + 18);

        ctx.font = "13px Cinzel";
        ctx.fillText(getCostText(opt.cost), bx + 40, by + 38);

        selectedWorker.buildButtons.push({
            type: opt.type,
            x: bx,
            y: by,
            w: bw,
            h: bh
        });
    }
}
function handleGameUILeftClick(cursorX, cursorY) {
    const selectedWorker = getSelectedWorker();

    if (selectedWorker && selectedWorker.buildButtons) {
        for (const btn of selectedWorker.buildButtons) {
            if (pointInRect(cursorX, cursorY, btn)) {
                startBuild(btn.type);
                
                return true;
            }
        }
    }

    if (game.buildMode) {
     
        return placeBuildingFromBuildMode();
    }

    return false;
}
function drawBuildingProgress(ctx, img, x, y, w, h, progress) {
    progress = Math.max(0, Math.min(1, progress));

    const visibleH = h * progress;
    if (visibleH <= 0) return;

    const srcX = 0;
    const srcY = img.height - img.height * progress;
    const srcW = img.width;
    const srcH = img.height * progress;

    const dstX = x;
    const dstY = y + (h - visibleH);
    const dstW = w;
    const dstH = visibleH;

    ctx.drawImage(
        img,
        srcX, srcY, srcW, srcH,
        dstX, dstY, dstW, dstH
    );
}
