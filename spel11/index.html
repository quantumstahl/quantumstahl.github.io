            var audio = new Audio('sounds/song.mp3');
            audio.loop = true;
             const context = new (window.AudioContext || window.webkitAudioContext)();
             const audio2 = async url => {   
             const source = context.createBufferSource(); 
                const audioBuffer = await fetch(url)
                  .then(res => res.arrayBuffer())
                  .then(ArrayBuffer => context.decodeAudioData(ArrayBuffer)); 
                source.buffer = audioBuffer;
                source.connect(context.destination);
                source.start();
            };
            
            document.addEventListener('click', (event) => {
                try{if(audio.paused){ audio.play();}}catch(error){};

            document.addEventListener("touchstart" , function(e) {

            function showPanHint(){
                const el = document.getElementById("hint-pan");
                if (el) {
                  el.innerText = mobileAndTabletCheck()
                    ? "Use two fingers to pan the map"
                    : "Use W A S D to move the camera";
                  el.style.display = "block";
                  setTimeout(()=> el.style.display = "none", 3000);
                }
            } 
            
  
           

            
            let keyState = {
                w: false,
                a: false,
                s: false,
                d: false,
                space: false
            };
            canvas.setAttribute("tabindex", "0");

            function focusGame() {
                window.focus();
               
              
            }

            canvas.addEventListener("click", focusGame);
            window.addEventListener("load", focusGame);

            
            const blockedKeys = [" ", "Space"];

            window.addEventListener("keydown", function(e) {
                if (blockedKeys.includes(e.key) || blockedKeys.includes(e.code)) {
                    e.preventDefault();
                }

                if (e.key === "w") keyState.w = true;
                if (e.key === "a") keyState.a = true;
                if (e.key === "s") keyState.s = true;
                if (e.key === "d") keyState.d = true;
                
            });

            window.addEventListener("keyup", function(e) {
                if (blockedKeys.includes(e.key) || blockedKeys.includes(e.code)) {
                    e.preventDefault();
                }

                if (e.key === "w") keyState.w = false;
                if (e.key === "a") keyState.a = false;
                if (e.key === "s") keyState.s = false;
                if (e.key === "d") keyState.d = false;
               
            });
            window.addEventListener("blur", () => {
                keyState.w = keyState.a = keyState.s = keyState.d = false;
              });
              
            let last=0;
            let savedframes=0;
            function fps() {
                frames++;
                const now = performance.now();
                if (now - last >= 1000) {
                    savedframes=frames;
                    frames = 0;
                    last = now;
                }
                ctx.font="20px Cinzel";
                ctx.fillText("fps:" +savedframes,20,20);
            }





            let lastTime = 0;

            function gameLoop(time){
                if (!lastTime) lastTime = time;

                let deltaMs = time - lastTime;
                lastTime = time;

                if (deltaMs > 50) deltaMs = 50;



                const scale = deltaMs / (1000 / 900);

                update(scale);
                requestAnimationFrame(gameLoop);
            }

            requestAnimationFrame(gameLoop);





            function updatecanvassize(){

                    canvas.style.position="absolute";
                    canvas.style.width  = document.body.clientWidth + "px";
                    canvas.style.height = document.body.clientHeight-8 + "px";
                }
                else{
                    if(window.innerHeight > window.innerWidth){
                        canvas.width=1100;
                        canvas.height=1600;  
                    }
                    else{
                        canvas.width=1600*1.2;
                        canvas.height=1100*1.2;
                    }
                    canvas.style.position="absolute";
                    canvas.style.width  = document.body.clientWidth + "px";
                    canvas.style.height = document.body.clientHeight + "px";

function orderWorkerGather(worker, resource) {
    if (!worker || !resource) return;
    if (resource.amount <= 0) return;

    worker.targetResource = resource;
    worker.jobType = resource.type;
    worker.targetDropoff = getNearestDropoff(worker, resource.type);
    worker.state = "moveToResource";

    const p = getApproachPoint(worker, resource, 18);
    worker.targetX=resource.x+resource.dimx/2;worker.targetY=resource.y+resource.dimy/2;
    requestUnitPath(worker, p.x, p.y);
    worker.standingstill=false;
   // if(worker.targetX=== null){worker.targetX=resource.x+resource.dimx/2;worker.targetY=resource.y+resource.dimy/2;worker.sistabit=true;worker.standingstill = false;}
   // else if(worker.targetX&&!worker.sistabit&& !worker.blocked){requestUnitPath(worker, p.x, p.y);}
   /// else {worker.targetX=resource.x+resource.dimx/2;worker.targetY=resource.y+resource.dimy/2;}
}        
function getNearestDropoff(unit, resourceType) {
    const owner = unit.owner || "player";

    const all = game.getAllObjects().filter(o =>
        !o.dead &&
        o.owner === owner &&
        o.dropoffTypes &&
        o.dropoffTypes.includes(resourceType)
    );

    let best = null;
    let bestDist = Infinity;

    for (const b of all) {
        const dx = b.x - unit.x;
        const dy = b.y - unit.y;
        const d = dx * dx + dy * dy;

        if (d < bestDist) {
            bestDist = d;
            best = b;
        }
    }

    return best;
}

function getNearestResourceOfType(unit, type) {
    if (!type) return null;

    const preferred = [];
    const fallback = [];
    const allObjects = game.getAllObjects();
    const rivers = getRiverList();

    for (const r of allObjects) {
        if (r.amount <= 0 || r.type !== type) continue;
        if (r.id != null && game.unreachableResources.has(r.id)) continue;

        if (r.name === "sheep") {
            if (r.owner && r.owner !== "neutral" && r.owner !== unit.owner) continue;
        }

        if (r.name === "farm" || r.name === "rfarm" || r.name === "gfarm" || r.name === "yfarm") continue;
        if (r.slot && r.slot !== unit) continue;

        const rx = r.x + r.dimx / 2;
        const ry = r.y + r.dimy / 2;
        const dx = rx - unit.x;
        const dy = ry - unit.y;
        const airD2 = dx * dx + dy * dy;

        const item = { r, airD2 };

        if (aabbHitsRiverBetweenFast(unit.x, unit.y, rx, ry, rivers)) {
            fallback.push(item);
        } else {
            preferred.push(item);
        }
    }

    preferred.sort((a, b) => a.airD2 - b.airD2);
    fallback.sort((a, b) => a.airD2 - b.airD2);

    // 1. samma sida först
    let best = findBestReachableResourceCheap(unit, preferred, 1);
    if (best) return best;

    // 2. andra sidan, normal billig test
    best = findBestReachableResourceCheap(unit, fallback, 1);
    if (best) return best;

    // 3. nödfallback: testa fler, men fortfarande bara fallback
    //best = findBestReachableResourceCheap(unit, fallback, 12);
    //if (best) return best;

    return null;
}
function findBestReachableResourceCheap(unit, candidates, maxTest) {
    let best = null;
    let bestScore = Infinity;

    let limit = Math.min(candidates.length, maxTest);

    for (let i = 0; i < limit; i++) {
        const r = candidates[i].r;
        const p = getApproachPoint(unit, r, 18);
        if (!p) continue;
        const path = game.findPath(unit.x, unit.y, p.x, p.y, {
            isBlocker: game.pathfinding.options.isBlocker
        });

        if (!Array.isArray(path) || path.length === 0){continue;}

        const last = path[path.length - 1];
        const endDist = Math.hypot(last.x - p.x, last.y - p.y);
        if (endDist >= 80){ continue;}

        const score = path.length * 32 + endDist;

        if (score < bestScore) {
            bestScore = score;
            best = r;
        }
		if(!best){i--;game.unreachableResources.add(r.id);}
    }

    return best;
}

function getRiverList() {
    if (!game._riverListCache || game.needsPathRebuild) {
        game._riverListCache = game.getAllObjects().filter(o => o.name === "river");
    }
    return game._riverListCache;
}

function aabbHitsRiverBetweenFast(ux, uy, rx, ry, rivers) {
    const minx = Math.min(ux, rx);
    const miny = Math.min(uy, ry);
    const maxx = Math.max(ux, rx);
    const maxy = Math.max(uy, ry);

    for (const o of rivers) {
        const ox1 = o.x;
        const oy1 = o.y;
        const ox2 = o.x + o.dimx;
        const oy2 = o.y + o.dimy;

        if (
            maxx >= ox1 &&
            minx <= ox2 &&
            maxy >= oy1 &&
            miny <= oy2
        ) {
            return true;
        }
    }

    return false;
}

function getNearestUnitInRange(boar, range) {

    for (const owner of owners) {
        units.push(...getTeamObjects("worker", owner));

function updateBoar(boar, scale) {
    if (boar.dead) return;
    boar.standingstill=false;
    // cooldown
    if (boar.attackCooldown > 0) {
        boar.attackCooldown -= 1 * scale;
        if (boar.attackCooldown < 0) boar.attackCooldown = 0;
    }



    if (boar.state === "idle") {
        const target = getNearestUnitInRange(boar, boar.aggroRange);
        if (target) {
            boar.targetUnit = target;
            boar.state = "aggro";
            return;
        }

        updatePassiveWander(boar, scale, 70, 80, 200);
        return;
    }

    if (boar.state === "aggro") {
        const t = boar.targetUnit;

        if (!t || t.dead) {
            boar.targetUnit = null;
            boar.state = "return";
            return;
        }

        const dxSpawn = boar.x - boar.spawnX;
        const dySpawn = boar.y - boar.spawnY;
        const dSpawn = Math.hypot(dxSpawn, dySpawn);

        if (dSpawn > boar.leashRange) {
            boar.targetUnit = null;
            boar.state = "return";
            return;
        }

      

        if (game.collideswithanoterobject(boar,t)) {
            boar.state = "attack";
            boar.standingstill = true;
            return;
        }

        moveBoarTowards(boar, t.x, t.y);
        return;
    }

    if (boar.state === "attack") {
        const t = boar.targetUnit;

        if (!t || t.dead) {
            boar.targetUnit = null;
            boar.state = "return";
            return;
        }

     

        if (!game.collideswithanoterobject(boar,t)) {
            boar.state = "aggro";
            return;
        }

        boar.standingstill = true;

        if (boar.attackCooldown <= 0) {
            boar.attackCooldown = 60; // justera
            t.hp = (t.hp || 20) - boar.damage;
             t.flashTimer=30;
            // enkel knockback om du vill
            // t.vx = (dx > 0 ? 1 : -1) * 1.5;
            // t.vy = -1;

            if (t.hp <= 0) {
                t.selectable = false;
                t.flashTimer = 0;
                t.dead = true;

                const owner = t.owner || "player";
                const res = teamResources[owner];
                if (res) {
                    res.pop -= 1;
                    if (res.pop < 0) res.pop = 0;
                }

                if (t.name.includes("worker")) {
                    t.animation = 12;
                } else if (t.name.includes("warrior")) {
                    t.animation = 9;
                }

                boar.targetUnit = null;
                boar.state = "return";
            }
        }

        return;
    }

    if (boar.state === "return") {
        const dx = boar.spawnX - boar.x;
        const dy = boar.spawnY - boar.y;
        const dist = Math.hypot(dx, dy);

        if (dist < 8) {
            boar.x = boar.spawnX;
            boar.y = boar.spawnY;
            boar.state = "idle";
            boar.standingstill = true;
            return;
        }

        moveBoarTowards(boar, boar.spawnX, boar.spawnY);
        return;
    }

    if (boar.state === "dead") {
        boar.standingstill = true;
        return;
    }
}

function updatePassiveWander(unit, scale, radius = 80, waitMin = 40, waitMax = 140) {
    if (unit.dead) return;
 
    if (unit.spawnX == null) unit.spawnX = unit.x;
    if (unit.spawnY == null) unit.spawnY = unit.y;

    if (unit.wanderTimer == null) unit.wanderTimer = 0;
    if (unit.wanderState == null) unit.wanderState = "wait"; // "wait" | "move"
    if (unit.wanderMoveTimer == null) unit.wanderMoveTimer = 0;
    
    if (unit.wanderState === "wait") {
        unit.standingstill = true;
        unit.wanderTimer -= 1 * scale;

        if (unit.wanderTimer <= 0) {
            const angle = Math.random() * Math.PI * 2;
            const dist = Math.random() * radius;

            unit.wanderTargetX = unit.spawnX + Math.cos(angle) * dist;
            unit.wanderTargetY = unit.spawnY + Math.sin(angle) * dist;

            unit.targetX = unit.wanderTargetX;
            unit.targetY = unit.wanderTargetY;
            unit.standingstill = false;
            unit.wanderState = "move";
        }
        return;
    }

if (unit.wanderState === "move") {
    const dx = unit.targetX - unit.x;
    const dy = unit.targetY - unit.y;
    const d = Math.hypot(dx, dy);

    unit.wanderMoveTimer += 1 * scale;

    if (d < 10 || unit.wanderMoveTimer > 120) {
        unit.wanderState = "wait";
        unit.wanderTimer = waitMin + Math.random() * (waitMax - waitMin);
        unit.wanderMoveTimer = 0;
        unit.standingstill = true;
        return;
    }

    unit.standingstill = false;
}
}

function destroyBuilding(obj) {
    if (!obj) return false;

    const objtype = game.getobjecttype(obj.name);
    if (!objtype) return false;

    const owner = obj.owner || "player";
    const resources = teamResources[owner];
    if (!resources) return false;

    // refund
    if (obj.isUnderConstruction && obj.cost) {
        if (obj.cost.wood)  resources.wood  += obj.cost.wood;
        if (obj.cost.food)  resources.food  += obj.cost.food;
        if (obj.cost.gold)  resources.gold  += obj.cost.gold;
        if (obj.cost.stone) resources.stone += obj.cost.stone;
    } else if (obj.cost) {
        if (obj.cost.wood)  resources.wood  += Math.floor(obj.cost.wood * 0.5);
        if (obj.cost.food)  resources.food  += Math.floor(obj.cost.food * 0.5);
        if (obj.cost.gold)  resources.gold  += Math.floor(obj.cost.gold * 0.5);
        if (obj.cost.stone) resources.stone += Math.floor(obj.cost.stone * 0.5);
    }

    if (obj.buildingType === "hus" || obj.name.endsWith("hus") || obj.name === "hus" || obj.name === "rhus" || obj.name === "yhus" || obj.name === "ghus") {
        resources.popMax -= 5;
        if (resources.popMax < 0) resources.popMax = 0;
    }

    game.removeobject(objtype, obj);
    markStaticsDirty();
    return true;
}

function updateWarrior(warrior, scale) {
    if (warrior.dead) return;

    if (warrior.attackCooldown == null) warrior.attackCooldown = 0;
    if (warrior.damage == null) warrior.damage = 8;
    if (warrior.hp == null) warrior.hp = 40;
    if (warrior.state == null) warrior.state = "idle";
    if (warrior.autoAttackRange == null) warrior.autoAttackRange = 180;

    if (warrior.attackCooldown > 0) {
        warrior.attackCooldown -= 1 * scale;
        if (warrior.attackCooldown < 0) warrior.attackCooldown = 0;
    }




    // AUTOATTACK: testa innan idle/move logik
    if (warrior.state === "idle" || warrior.state === "move") {
        if (tryAutoAttack(warrior)) {
            return;
        }
    }

    if (warrior.state === "idle") {
        warrior.standingstill = true;
        return;
    }

if (warrior.state === "move") {
    if (warrior.path && warrior.path.length > 0) {
        game.followPath(warrior, { reachDist: 25 });
        warrior.standingstill = false;
    } else {
        // ingen path kvar = klar
        warrior.state = "idle";
        warrior.targetX = null;
        warrior.targetY = null;
        warrior.standingstill = true;
    }



    return;
}

    if (warrior.state === "attackTarget") {
        const t = warrior.targetEnemy;

        if (!t || t.dead || t.hp <= 0) {
            finishWarriorAttack(warrior);
            return;
        }

        if (game.collideswithanoterobject(warrior, t)) {
            clearUnitPath(warrior);
            warrior.standingstill = true;

            if (warrior.attackCooldown <= 0) {
                warrior.attackCooldown = 40;
                t.hp = (t.hp || 40) - warrior.damage;
                t.flashTimer = 30;

                if (t.hp <= 0) {
                    t.hp = 0;
                    t.dead = true;

                    if (t.name === "boar") {
                        t.animation = 6;
                        t.type = "food";
                    } else if (t.name.includes("worker")) {
                        t.animation = 12;
                        t.selectable = false;
                    } else if (t.name.includes("warrior")) {
                        t.animation = 9;
                        t.selectable = false;
                    }

                    if (t.isBuilding) {
                        game.removeobject(game.getobjecttype(t.name), t);
                        markStaticsDirty();
                    }

                    if (t.owner && teamResources[t.owner] && (t.name.includes("worker") || t.name.includes("warrior"))) {
                        teamResources[t.owner].pop -= 1;
                        if (teamResources[t.owner].pop < 0) teamResources[t.owner].pop = 0;
                    }

                    finishWarriorAttack(warrior);
                }
            }

            return;
        }

        if (warrior.repathTimer == null) warrior.repathTimer = 0;
        warrior.repathTimer -= 1 * scale;

        if (warrior.repathTimer <= 0 || !warrior.path || warrior.path.length === 0) {
            const tx = t.x + t.dimx / 2;
            const ty = t.y + t.dimy / 2;

            const ddx = tx - (warrior._lastPathGoalX ?? tx);
            const ddy = ty - (warrior._lastPathGoalY ?? ty);
            const moved = Math.hypot(ddx, ddy);

            if (!warrior.path || warrior.path.length === 0 || moved > 40) {
                warrior._lastPathGoalX = tx;
                warrior._lastPathGoalY = ty;
                game.pathUnitTo(warrior, tx, ty);
            }

            warrior.repathTimer = 500;
        }

        if (warrior.path && warrior.path.length > 0) {
            game.followPath(warrior, { reachDist: 25 });
        } else {
            warrior.targetX = t.x + t.dimx / 2;
            warrior.targetY = t.y + t.dimy / 2;
            warrior.standingstill = false;
        }

        return;
    }
}
function queueWarriorTraining(barrack, playerResources) {
    if (!barrack || barrack.isUnderConstruction) return false;
    if ((playerResources.food || 0) < 60) return false;
    if ((playerResources.gold || 0) < 20) return false;
    if (barrack.trainingQueue.length >= 8) return false;
    if (playerResources.pop >= playerResources.popMax) return false;

    playerResources.food -= 60;
    playerResources.gold -= 20;

    barrack.trainingQueue.push("warrior");
    return true;
}
function updateBarrackTraining(barrack, scale) {
    if (!barrack.trainingQueue || barrack.trainingQueue.length === 0) {
        barrack.trainingTimer = 0;
        return;
    }

    barrack.trainingTimer += 1 * scale;

    if (barrack.trainingTimer >= barrack.trainingTimeMax) {
        const unitType = barrack.trainingQueue[0];

        let spawned = false;
        if (unitType === "warrior") {
            spawned = spawnWarriorFromBarrack(barrack);
        }

        if (spawned) {
            barrack.trainingQueue.shift();
            barrack.trainingTimer = 0;
        } else {
            barrack.trainingTimer = barrack.trainingTimeMax;
        }
    }
}
function spawnWarriorFromBarrack(barrack) {
    const owner = barrack.owner || "player";
    const resources = teamResources[owner];
    const warriorType = getTeamObjectType("warrior", owner);
    if (!warriorType) return false;

    const pos = findFreeSpawnPosition(barrack, 40, 60);
    if (!pos) return false;

    if (resources.pop >= resources.popMax) {
        return false;
    }

    resources.pop += 1;

    const w = game.addobject(warriorType, pos.x, pos.y, 40, 60, 0, false);
    if (!w) return false;

    w.owner = owner;
   // w.state = "idle";
    w.hp = 40;
    w.maxHp = 40;
    w.damage = 6;
    w.attackRange = 28;
    w.attackCooldown = 0;
    w.moveSpeed = 1.2;
    w.targetEnemy = null;
    w.selectable = true;
    w.iscontrollable = owner === "player";
    w.direction = "down";
    w.standingstill = true;
    w.autoAttackRange = 180;
    w.resumeMoveAfterAttack = false;
    w.resumeX = null;
    w.resumeY = null;

    ensureBarrackRallyPoint(barrack);

function drawBarrackTrainingQueue(ctx, barrack, currentMap) {
    if (!barrack.trainingQueue || barrack.trainingQueue.length === 0) return;

    const owner = barrack.owner || "player";

    const iconSize = 30;
    const gap = 4;
    const maxVisible = 8;

    const queue = barrack.trainingQueue.slice(0, maxVisible);
    const totalW = queue.length * iconSize + (queue.length - 1) * gap;

    const startX = barrack.x + currentMap.camerax + barrack.dimx / 2 - totalW / 2;
    const y = barrack.y + currentMap.cameray - 34;

    for (let i = 0; i < queue.length; i++) {
        const type = queue[i];
        let img = null;

        if (type === "warrior") {
            img = getTeamObjectType("warrior", owner)?.images?.[1]?.getimage();
        }

        if (!img) continue;

        const x = startX + i * (iconSize + gap);

        ctx.fillStyle = "rgba(0,0,0,0.7)";
        ctx.fillRect(x - 2, y - 2, iconSize + 4, iconSize + 4);

        ctx.drawImage(img, x, y, iconSize, iconSize);

        if (i === 0 && barrack.trainingTimeMax > 0) {
            const p = Math.min(1, barrack.trainingTimer / barrack.trainingTimeMax);

            ctx.drawImage(img, x, y, iconSize, iconSize);
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(x, y, iconSize, iconSize);

            const w = iconSize * p;

            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, iconSize);
            ctx.clip();

            ctx.fillStyle = "orange";
            ctx.fillRect(x, y, iconSize, iconSize);
            ctx.drawImage(img, x, y, iconSize, iconSize);
            ctx.restore();
        }
    }
}

function placeBuildingForOwner(x, y, buildingType, owner, builder) {

    if (!canAffordForTeam(def.cost, resources)) return false;

    b.owner = owner;

    b.isBuilding = true;
    b.isUnderConstruction = true;
    b.state = "building";
    b.buildingType = buildingType;
    b.buildProgress = 0;
    b.buildTimer = 0;
    b.buildTimeMax = def.buildTime;
    b.maxHp = def.hp;
    b.hp = 1;
    b.popGranted = false;
    b.cost = def.cost;

        clearWorkerOrder(builder);

function canAffordForTeam(cost, resources) {
    for (const key in cost) {
        if ((resources[key] || 0) < cost[key]) return false;
    }
    return true;
}

function payCostForTeam(cost, resources) {
    for (const key in cost) {
        resources[key] -= cost[key];
    }
}
function findBuildSpotNear(base, w, h, tries = 30, radius = 260) {
    for (let i = 0; i < tries; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 120 + Math.random() * radius;

        const x = Math.floor(base.x + base.dimx / 2 + Math.cos(angle) * dist - w / 2);
        const y = Math.floor(base.y + base.dimy / 2 + Math.sin(angle) * dist - h / 2);

        if (canPlaceBuilding(x, y, w, h)) {
            return { x, y };
        }
    }
    return null;
}

function isEnemy(a, b) {
    if (!a || !b) return false;
    if (a.dead || b.dead) return false;

    const fa = getFaction(a.owner);
    const fb = getFaction(b.owner);

    if (fa === "neutral" || fb === "neutral") return false;

    return fa !== fb;
}

function getAttackTargetForOwner(owner) {
    const enemies = [];

    for (const enemyOwner of getEnemyOwners(owner)) {
        enemies.push(...getTeamObjects("warrior", enemyOwner));
        enemies.push(...getTeamObjects("worker", enemyOwner));
        enemies.push(...getTeamObjects("townhall", enemyOwner));
        enemies.push(...getTeamObjects("barrack", enemyOwner));
        enemies.push(...getTeamObjects("hus", enemyOwner));
        enemies.push(...getTeamObjects("tower", enemyOwner));
    }

    let best = null;
    let bestDist = Infinity;
    const myTownhall = getTeamObjects("townhall", owner)[0];
    if (!myTownhall) return enemies.find(e => !e.dead) || null;

    for (const e of enemies) {
        if (!e || e.dead) continue;
        const d = dist2(myTownhall, e);
        if (d < bestDist) {
            bestDist = d;
            best = e;
        }
    }

    return best;
}

function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh, pad = 0) {
    return (
        ax < bx + bw + pad &&
        ax + aw > bx - pad &&
        ay < by + bh + pad &&
        ay + ah > by - pad
    );
}
function getBuilderWorkerForTeam(owner) {
    const workers = getTeamObjects("worker", owner).filter(w => !w.dead);

    // 1. bästa fallet: idle
    let w = workers.find(w =>
        w.state === "idle" &&
        !w.targetBuilding
    );
    if (w) return w;

    // 2. annars ta en som samlar / är på väg till resurs
    w = workers.find(w =>
        !w.targetBuilding &&
        (
            w.state === "moveToResource" ||
            w.state === "gather" ||
            w.state === "returnToBase" ||
            w.state === "deposit"
        )
    );
    if (w) return w;

    // 3. sista utväg: vad som helst som inte redan bygger
    w = workers.find(w =>
        !w.targetBuilding &&
        w.state !== "buildBuilding" &&
        w.state !== "attackBoar"
    );
    return w || null;
}

function getNearestThreatToOwner(owner, range = 300) {
    const myUnits = [
        ...getTeamObjects("worker", owner),
        ...getTeamObjects("warrior", owner),
        ...getTeamObjects("townhall", owner),
        ...getTeamObjects("barrack", owner),
        ...getTeamObjects("hus", owner),
        ...getTeamObjects("tower", owner)
    ].filter(o => !o.dead);

    const boars = game.getobjecttype("boar")?.objects || [];
    const enemyOwners = getEnemyOwners(owner);

    let threats = [...boars.filter(b => !b.dead)];

    for (const eo of enemyOwners) {
        threats.push(...getTeamObjects("worker", eo).filter(o => !o.dead));
        threats.push(...getTeamObjects("warrior", eo).filter(o => !o.dead));
    }

    let bestThreat = null;
    let bestDist = range * range;

    for (const my of myUnits) {
        for (const t of threats) {
            const dx = my.x - t.x;
            const dy = my.y - t.y;
            const d = dx * dx + dy * dy;

            if (d < bestDist) {
                bestDist = d;
                bestThreat = t;
            }
        }
    }

    return bestThreat;
}

function isThreatStillRelevant(owner, threat, range = 320) {
    if (!threat || threat.dead) return false;

    const myThings = [
        ...getTeamObjects("worker", owner),
        ...getTeamObjects("warrior", owner),
        ...getTeamObjects("townhall", owner),
        ...getTeamObjects("barrack", owner),
        ...getTeamObjects("hus", owner)
    ].filter(o => !o.dead);

    const range2 = range * range;

    for (const o of myThings) {
        const dx = o.x - threat.x;
        const dy = o.y - threat.y;
        const d2 = dx * dx + dy * dy;
        if (d2 <= range2) return true;
    }

    return false;
}

function updateUnitPathMovement(unit, scale, options = {}) {
    if (!unit || unit.dead) return;

    const reachDist = options.reachDist ?? 14;
    const repathEvery = options.repathEvery ?? 45;
    const movedThreshold = options.movedThreshold ?? 24;

    if (unit.targetX == null || unit.targetY == null) {
  
        clearUnitPath(unit);
        return;
    }

    if (unit.repathTimer == null) unit.repathTimer = 0;
    unit.repathTimer -= 1 * scale;

    const gx = unit.targetX;
    const gy = unit.targetY;

    const dxGoal = gx - (unit._lastPathGoalX ?? gx);
    const dyGoal = gy - (unit._lastPathGoalY ?? gy);
    const goalMoved = Math.hypot(dxGoal, dyGoal);

    if (
        unit.repathTimer <= 0 ||
        !unit.path ||
        unit.path.length === 0 ||
        goalMoved > movedThreshold
    ) {
        unit._lastPathGoalX = gx;
        unit._lastPathGoalY = gy;
        game.pathUnitTo(unit, gx, gy);
        unit.repathTimer = repathEvery;
    }

    if (unit.path && unit.path.length > 0) {
        game.followPath(unit, { reachDist });
    }
    else{unit.standingstill=true;}


}
function drawUnitPathDebug(ctx, unit, color = "yellow") {
    if (!unit || !unit.path || unit.path.length === 0) return;

    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(unit.x + game.getcamerax(), unit.y + game.getcameray());

    for (let i = unit.pathIndex || 0; i < unit.path.length; i++) {
        const p = unit.path[i];
        ctx.lineTo(p.x + game.getcamerax(), p.y + game.getcameray());
    }

    ctx.stroke();

    for (let i = unit.pathIndex || 0; i < unit.path.length; i++) {
        const p = unit.path[i];
        ctx.beginPath();
        ctx.arc(
            p.x + game.getcamerax(),
            p.y + game.getcameray(),
            4,
            0,
            Math.PI * 2
        );
        ctx.fillStyle = color;
        ctx.fill();
    }
}

margin= 0;

function getWarriorAutoAttackTarget(warrior, range = 180) {
    if (!warrior || warrior.dead) return null;

    const enemies = [];

    // vanliga fiendelag
    for (const enemyOwner of getEnemyOwners(warrior.owner)) {
        enemies.push(...getTeamObjects("worker", enemyOwner));
        enemies.push(...getTeamObjects("warrior", enemyOwner));
        enemies.push(...getTeamObjects("townhall", enemyOwner));
        enemies.push(...getTeamObjects("barrack", enemyOwner));
        enemies.push(...getTeamObjects("hus", enemyOwner));
        enemies.push(...getTeamObjects("lumbercamp", enemyOwner));
        enemies.push(...getTeamObjects("miningcamp", enemyOwner));
        enemies.push(...getTeamObjects("mill", enemyOwner));
        enemies.push(...getTeamObjects("farm", enemyOwner));
    }

    // boar får också vara autoattack-target
    const boars = game.getobjecttype("boar")?.objects || [];
    enemies.push(...boars);

    let best = null;
    let bestDist = range * range;

    for (const e of enemies) {
        if (!e || e.dead) continue;
        if (e === warrior) continue;

        // boar är neutral, så den måste tillåtas separat
        const validEnemy = e.name === "boar" || isEnemyOf(warrior, e);
        if (!validEnemy) continue;

        const ex = e.x + e.dimx / 2;
        const ey = e.y + e.dimy / 2;
        const wx = warrior.x + warrior.dimx / 2;
        const wy = warrior.y + warrior.dimy / 2;

        const dx = ex - wx;
        const dy = ey - wy;
        const d2 = dx * dx + dy * dy;

        if (d2 < bestDist) {
            bestDist = d2;
            best = e;
        }
    }

    return best;
}
function tryAutoAttack(warrior) {
    if (!warrior || warrior.dead) return false;

    // bara när den inte redan slåss
    if (warrior.state !== "idle" && warrior.state !== "move") return false;

    const target = getWarriorAutoAttackTarget(warrior, warrior.autoAttackRange || 180);
    if (!target) return false;

    // om den gick mot en punkt, spara den så vi kan återuppta efter fight
    if (warrior.state === "move" && warrior.targetX != null && warrior.targetY != null) {
        warrior.resumeMoveAfterAttack = true;
        warrior.resumeX = warrior.targetX;
        warrior.resumeY = warrior.targetY;
    } else {
        warrior.resumeMoveAfterAttack = false;
        warrior.resumeX = null;
        warrior.resumeY = null;
    }

    orderWarriorAttackTarget(warrior, target);
    return true;
}
function finishWarriorAttack(warrior) {
    if (!warrior) return;

    warrior.targetEnemy = null;

    if (warrior.resumeMoveAfterAttack && warrior.resumeX != null && warrior.resumeY != null) {
        const rx = warrior.resumeX;
        const ry = warrior.resumeY;

        warrior.resumeMoveAfterAttack = false;
        warrior.resumeX = null;
        warrior.resumeY = null;

        orderUnitMove(warrior, rx, ry);
    } else {
        warrior.state = "idle";
        warrior.targetX = null;
        warrior.targetY = null;
        warrior.standingstill = true;
        clearUnitPath(warrior);
    }
}

        if (o === tower) continue;

        // ignorera projektiler
        if (o.isProjectile) continue;

        // ignorera neutralt skräp om du vill
        if (o.holdingicon) continue;

        // MÅSTE vara fiende (eller boar)
        const isValid =
            o.name === "boar" ||
            isEnemyOf(tower, o);

        if (!isValid) continue;

        const ox = o.x + o.dimx / 2;
        const oy = o.y + o.dimy / 2;

        const dx = ox - tx;
        const dy = oy - ty;
        const d = dx * dx + dy * dy;

        if (d < bestDist) {
            bestDist = d;
            best = o;
        }
    }

    return best;
}
function spawnArrow(tower, target) {
    if (!tower || !target || target.dead) return null;

    const owner = tower.owner || "player";
    const arrowType = getTeamObjectType("arrow", owner) || game.getobjecttype("arrow");
    if (!arrowType) return null;

    const sx = tower.x + tower.dimx / 2 - 8;
    const sy = tower.y + tower.dimy / 2 - 8;

    const a = game.addobject(arrowType, sx, sy, 16, 16, 0, false);
    if (!a) return null;

    a.owner = owner;
    a.targetEnemy = target;
    a.damage = tower.damage || 6;
    a.speed = 6;
    a.state = "fly";
    a.selectable = false;
    a.canMove = true;
    a.isProjectile = true;

    return a;
}
function updateTower(tower, scale) {
    if (tower.dead) return;

    if (tower.attackCooldown > 0) {
        tower.attackCooldown -= 1 * scale;
        if (tower.attackCooldown < 0) tower.attackCooldown = 0;
    }

    let t = tower.targetEnemy;

    if (!t || t.dead) {
        t = getTowerTarget(tower);
        tower.targetEnemy = t;
    }

   

    if (!t) return;

    const tx = tower.x + tower.dimx / 2;
    const ty = tower.y + tower.dimy / 2;
    const ex = t.x + t.dimx / 2;
    const ey = t.y + t.dimy / 2;

    const dx = ex - tx;
    const dy = ey - ty;
    const dist = Math.hypot(dx, dy);

    

    if (dist > tower.attackRange) {
        tower.targetEnemy = null;
        return;
    }

    if (tower.attackCooldown <= 0) {
        tower.attackCooldown = tower.attackSpeed;
        spawnArrow(tower, t);
    }
}
function getAllArrowsAllTeams() {
    return getAllObjectsOfBaseTypeAllTeams("arrow");
}
function updateArrow(arrow, scale) {
    if (!arrow || arrow.dead) return;

    const t = arrow.targetEnemy;

    if (!t || t.dead) {
        game.removeobject(game.getobjecttype(arrow.name), arrow);
        return;
    }

    const tx = t.x + t.dimx / 2;
    const ty = t.y + t.dimy / 2;

    const dx = tx - arrow.x;
    const dy = ty - arrow.y;
    const dist = Math.hypot(dx, dy);

    if (dist < 10 || game.collideswithanoterobject(arrow, t)) {
        t.hp = (t.hp || 40) - (arrow.damage || 6);
        t.flashTimer = 30;

        if (t.hp <= 0) {
            t.hp = 0;
            t.dead = true;
            t.selectable = false;

            if (t.name === "boar") {
                t.animation = 6;
                t.type = "food";
            } else if (t.name.includes("worker")) {
                t.animation = 12;
            } else if (t.name.includes("warrior")) {
                t.animation = 9;
            } else if (t.isBuilding) {
                game.removeobject(game.getobjecttype(t.name), t);
                markStaticsDirty();
            }

            if (t.owner && teamResources[t.owner] && (t.name.includes("worker") || t.name.includes("warrior"))) {
                teamResources[t.owner].pop -= 1;
                if (teamResources[t.owner].pop < 0) teamResources[t.owner].pop = 0;
            }
        }

        game.removeobject(game.getobjecttype(arrow.name), arrow);
        return;
    }

    if (dist > 0.001) {
        arrow.x += (dx / dist) * (arrow.speed || 6) * scale;
        arrow.y += (dy / dist) * (arrow.speed || 6) * scale;

        arrow.rot = Math.atan2(dy, dx) * 180 / Math.PI;
    }
}
function getAITargetWorkerCounts(owner) {
    const resources = teamResources[owner];
    const barracks = getTeamObjects("barrack", owner).filter(b => !b.dead && !b.isUnderConstruction);

    let food = 3;
    let wood = 3;
    let gold = 0;
    let stone = 0;

    // när barrack finns och AI ska göra warriors behövs guld
    if (barracks.length > 0) {
        gold = 2;
    }

    // om låg på food, öka food-prio
    if ((resources.food || 0) < 80) food += 1;

    // om låg på wood, öka wood-prio
    if ((resources.wood || 0) < 80) wood += 1;

    // om låg på gold, öka gold-prio
    if ((resources.gold || 0) < 40 && barracks.length > 0) gold += 1;

    return { food, wood, gold, stone };
}
function getAIWorkerJobCounts(owner) {
    const workers = getTeamObjects("worker", owner).filter(w => !w.dead);

    const counts = {
        food: 0,
        wood: 0,
        gold: 0,
        stone: 0,
        build: 0,
        idle: 0
    };

    for (const w of workers) {
        if (w.state === "buildBuilding") {
            counts.build++;
            continue;
        }

        if (w.state === "idle") {
            counts.idle++;
            continue;
        }

        if (w.jobType === "food") counts.food++;
        else if (w.jobType === "wood") counts.wood++;
        else if (w.jobType === "gold") counts.gold++;
        else if (w.jobType === "stone") counts.stone++;
        else counts.idle++;
    }

    return counts;
}
function getMostNeededResourceJob(owner) {
    const wanted = getAITargetWorkerCounts(owner);
    const current = getAIWorkerJobCounts(owner);

    const deficits = [
        { type: "food",  need: wanted.food  - current.food },
        { type: "wood",  need: wanted.wood  - current.wood },
        { type: "gold",  need: wanted.gold  - current.gold },
        { type: "stone", need: wanted.stone - current.stone }
    ];

    deficits.sort((a, b) => b.need - a.need);

    if (deficits[0].need > 0) return deficits[0].type;

    return "wood";
}
function drawHealthBars() {
    if(!game.maps[game.currentmap])return;
    
  const map = game.maps[game.currentmap];
  const zoom = 1 + (map.zoom / 100); // samma zoom som du använder för input
  const camX = map.camerax;
  const camY = map.cameray;

  const objs = game.getAllObjects().filter(o => o.selectable&& o.name!=="tree"&& o.name!=="stone"&& o.name!=="gold"&& o.name!=="berry"&& o.name!=="sheep");
  for (const o of objs) {
      if(!o.isvisable||o.dead)continue;


    const hpPct = Math.max(0, Math.min(1, o.hp / o.maxHp));

    // Värld → skärm
    const sx = (o.x + camX) * zoom;
    const sy = (o.y + camY) * zoom;

    const barW = Math.max(20, o.dimx * zoom);  // skala med zoom, ha en min.bredd
    const barH = Math.max(3, 5 * (zoom >= 1 ? zoom : 1)); // öka svagt med zoom
    const offsetY = -10 * zoom; // ovanför objektet
    
        
    
    if(o.name=="swordguy"){
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(50, 50 + offsetY, 800, 30);

        // Röd full bar
        ctx.fillStyle = "red";
        ctx.fillRect(50, 50 + offsetY, 800, 30);

        // Grön nuvarande HP
        ctx.fillStyle = "lime";
        ctx.fillRect(50, 50 + offsetY, 800 * hpPct, 30);

        // Kant
        ctx.strokeStyle = "black";
        ctx.lineWidth = 1;
        ctx.strokeRect(50, 50 + offsetY, 800, 30);
        
    }
    else{
    // Bakgrund
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(sx, sy + offsetY, barW, barH);

    // Röd full bar
    ctx.fillStyle = "red";
    ctx.fillRect(sx, sy + offsetY, barW, barH);

    // Grön nuvarande HP
    ctx.fillStyle = "lime";
    ctx.fillRect(sx, sy + offsetY, barW * hpPct, barH);

    // Kant
    ctx.strokeStyle = "black";
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy + offsetY, barW, barH);
    }
    
  
    
    
    
  }
  
          
  
  
}
